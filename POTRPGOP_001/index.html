<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="robots" content="noindex, nofollow"><title>TRPG</title><style>html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#555;font-family:sans-serif;color:#fff;display:flex;flex-direction:column;}.bar{display:flex;gap:12px;padding:10px 20px;background:#2a2a2a;box-shadow:0 2px 5px rgba(0,0,0,0.3);z-index:10;align-items:center;}.main-content{flex:1;display:flex;flex-direction:row;width:100vw;overflow:hidden;position:relative;}.left-sidebar{width:180px;background:#222;padding:20px 15px;display:flex;flex-direction:column;gap:15px;box-shadow:2px 0 5px rgba(0,0,0,0.3);z-index:9;box-sizing:border-box;}.sidebar-item{display:flex;flex-direction:column;gap:5px;font-size:14px;}input{background:#333;color:#fff;border:1px solid #555;padding:6px;border-radius:4px;box-sizing:border-box;width:100%;}button,.upload-btn{background:#4a90e2;color:white;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;font-weight:bold;white-space:nowrap;font-size:14px;display:inline-block;}button:hover,.upload-btn:hover{background:#357abd;}.map-container{flex:1;position:relative;overflow:hidden;display:flex;justify-content:center;align-items:center;background:#444;user-select:none;}#mapWrapper{position:absolute;width:min(calc(100vw - 220px),calc(100vh - 100px));height:min(calc(100vw - 220px),calc(100vh - 100px));background-color:#dddddd;background-size:100% 100%;background-repeat:no-repeat;background-position:center;border:2px solid #222;box-shadow:0 0 25px rgba(0,0,0,0.5);transform-origin:center center;will-change:transform;}.grid-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;}.token{position:absolute;width:6%;height:6%;border-radius:50%;cursor:move;z-index:2;background-size:cover;background-position:center;box-shadow:0 4px 8px rgba(0,0,0,0.5);top:10px;left:10px;}.player-token{border:3px solid #2ecc71;}.enemy-token{border:3px solid #e74c3c;}.sub-section{display:flex;align-items:center;gap:8px;border-right:1px solid #444;padding-right:15px;}.sub-section:last-child{border-right:none;}.bottom-float{position:absolute;bottom:0;left:0;width:100vw;z-index:100;display:flex;flex-direction:column;align-items:center;transform:translateY(calc(100% - 24px));transition:transform 0.25s ease;}.arrow-trigger{background:#2a2a2a;color:#fff;padding:2px 20px;font-size:14px;font-weight:bold;border-radius:6px 6px 0 0;cursor:pointer;width:auto;text-align:center;}.bottom-bar{width:100%;height:45px;overflow:hidden;}.bottom-float:hover{transform:translateY(0);}.bottom-float:hover .arrow-trigger{opacity:0;pointer-events:none;}.bottom-float:hover .bottom-bar{overflow-x:auto;}</style></head><body><div class="bar"><span style="font-weight:bold;">擲骰檢定：</span><button onclick="rollDice(100)">D100</button><button onclick="rollDice(20)" style="background:#27ae60;">D20</button><button onclick="rollDice(10)" style="background:#d35400;">D10</button><button onclick="rollDice(6)" style="background:#8e44ad;">D6</button><button onclick="rollDice(4)" style="background:#2980b9;">D4</button><span id="diceOutput" style="color:#ffcc00;font-weight:bold;margin-left:10px;">等待擲骰...</span></div><div class="main-content"><div class="left-sidebar"><h3 style="margin:0 0 5px 0;border-bottom:1px solid #444;padding-bottom:5px;color:#4a90e2;">角色資訊</h3><div class="sidebar-item"><label>角色姓名：</label><input type="text" id="charName" oninput="saveData()"></div><div class="sidebar-item"><label>目前血量 (HP)：</label><input type="number" id="charHP" value="10" oninput="saveData()"></div><div class="sidebar-item"><label>理智值 (SAN)：</label><input type="number" id="charSAN" value="50" oninput="saveData()"></div></div><div class="map-container" id="mapContainer"><div id="mapWrapper"><svg class="grid-layer" viewBox="0 0 500 500" xmlns="http://w3.org"><defs><pattern id="trpg-grid" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M 10 0 L 0 0 L 0 10" fill="none" stroke="rgba(0,0,0,0.65)" stroke-width="1.2"/></pattern></defs><rect width="500" height="500" fill="url(#trpg-grid)" stroke="rgba(0,0,0,0.65)" stroke-width="1.2" /></svg></div></div></div><div class="bottom-float"><div class="arrow-trigger">▲</div><div class="bar bottom-bar"><div class="sub-section"><span style="font-weight:bold;white-space:nowrap;">地圖管理：</span><label class="upload-btn" for="mapUpload" style="background:#e67e22;">上傳圖片</label><input type="file" id="mapUpload" accept="image/*" style="display:none;" onchange="uploadMap(event)"><button onclick="clearMap()" style="background:#c0392b;">重設地圖</button><button onclick="resetZoom()" style="background:#7f8c8d;">居中復原</button></div><div class="sub-section"><span style="font-weight:bold;white-space:nowrap;">玩家棋子：</span><label class="upload-btn" for="playerUpload" style="background:#2ecc71;">上傳棋子</label><input type="file" id="playerUpload" accept="image/*" style="display:none;" onchange="createToken(event,'player-token')"></div><div class="sub-section"><span style="font-weight:bold;white-space:nowrap;">敵人棋子：</span><label class="upload-btn" for="enemyUpload" style="background:#e74c3c;">上傳棋子</label><input type="file" id="enemyUpload" accept="image/*" style="display:none;" onchange="createToken(event,'enemy-token')"></div></div></div><script>let scale=1,posX=0,posY=0,isDragging=!1,startX,startY;const mapContainer=document.getElementById('mapContainer'),mapWrapper=document.getElementById('mapWrapper');window.onload=function(){if(localStorage.getItem("trpg_name"))document.getElementById("charName").value=localStorage.getItem("trpg_name");if(localStorage.getItem("trpg_hp"))document.getElementById("charHP").value=localStorage.getItem("trpg_hp");if(localStorage.getItem("trpg_san"))document.getElementById("charSAN").value=localStorage.getItem("trpg_san");const s=localStorage.getItem("trpg_map_bg");if(s)mapWrapper.style.backgroundImage=`url('${s}')`;initMapControls();};function initMapControls(){function e(e){e.preventDefault();const t=e.deltaY?-e.deltaY:e.wheelDelta;scale=Math.max(0.4,Math.min(6,scale+(t>0?0.1:-0.1))),updateTransform();}mapContainer.addEventListener('wheel',e,{passive:!1}),mapContainer.addEventListener('mousewheel',e,{passive:!1}),mapContainer.addEventListener('mousedown',e=>{if(e.target!==mapContainer&&e.target!==mapWrapper&&!e.target.classList.contains('grid-layer'))return;isDragging=!0,startX=e.clientX-posX,startY=e.clientY-posY,mapContainer.style.cursor='grabbing';}),window.addEventListener('mousemove',e=>{isDragging&&(posX=e.clientX-startX,posY=e.clientY-startY,updateTransform());}),window.addEventListener('mouseup',()=>{isDragging=!1,mapContainer.style.cursor='grab';});}function updateTransform(){mapWrapper.style.transform=`translate(${posX}px, ${posY}px) scale(${scale})`;}function resetZoom(){scale=1,posX=0,posY=0,updateTransform();}function saveData(){localStorage.setItem("trpg_name",document.getElementById("charName").value),localStorage.setItem("trpg_hp",document.getElementById("charHP").value),localStorage.setItem("trpg_san",document.getElementById("charSAN").value);}function uploadMap(e){const t=e.target.files;if(t){const n=new FileReader();n.onload=function(e){mapWrapper.style.backgroundImage=`url('${e.target.result}')`;try{localStorage.setItem("trpg_map_bg",e.target.result);}catch(e){}},n.readAsDataURL(t);}}function clearMap(){mapWrapper.style.backgroundImage="none",localStorage.removeItem("trpg_map_bg"),document.getElementById("mapUpload").value="";}function rollDice(e){document.getElementById("diceOutput").innerText=`D${e} 結果 ➔ ${Math.floor(Math.random()*e)+1}`;}document.querySelectorAll('.upload-btn').forEach(e=>{e.addEventListener('mousedown',e=>e.stopPropagation());});function createToken(e,t){const n=e.target.files;if(n){const a=new FileReader();a.onload=function(e){const n=document.createElement('div');n.className=`token ${t}`,n.style.backgroundImage=`url('${e.target.result}')`;let a=!1,o=0,i=0;n.addEventListener('mousedown',e=>{e.stopPropagation(),a=!0,o=e.clientX-n.offsetLeft,i=e.clientY-n.offsetTop;}),window.addEventListener('mousemove',e=>{a&&(n.style.left=`${e.clientX-o}px`,n.style.top=`${e.clientY-i}px`);}),window.addEventListener('mouseup',()=>{a=!1;}),mapWrapper.appendChild(n),e.target.value="";},a.readAsDataURL(n);}}</script></body></html>
