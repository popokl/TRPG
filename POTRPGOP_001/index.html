<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>🎲 TRPG 祕密跑團室 & 滿版戰術地圖</title>
    <style>
        /* 讓整個視窗填滿，不出現網頁最外層的捲軸 */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #1a1a1a; 
            font-family: sans-serif; 
            color: #fff;
            display: flex;
            flex-direction: column;
        }
        
        /* 上方精簡控制列 */
        .control-panel { 
            display: flex; 
            gap: 15px; 
            padding: 10px 20px;
            background: #2a2a2a;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10;
            align-items: center;
        }
        .box { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        input { background: #333; color: #fff; border: 1px solid #555; padding: 5px; border-radius: 4px; }
        input[type="text"] { width: 90px; }
        input[type="number"] { width: 50px; }
        button { background: #4a90e2; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #357abd; }
        .dice-result { color: #ffcc00; font-weight: bold; margin-left: 5px; }
        
        /* 畫面中央的地圖區域：完全填滿、無拉桿 */
        .map-container { 
            flex: 1; 
            position: relative; 
            width: 100vw; 
            height: 100%;
            background: #111; 
            overflow: hidden; 
        }
        
        /* 地圖本體 */
        #mapWrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            background-position: center;
        }
        
        /* 滿版網格圖層：利用 SVG 向量特性，強制在畫面上完美平分成 50x50 格 */
        .grid-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="box">
            <span>👤 角色：</span>
            <input type="text" id="charName" placeholder="名字" oninput="saveData()"> 
            <span>HP：</span><input type="number" id="charHP" value="10" oninput="saveData()"> 
            <span>SAN：</span><input type="number" id="charSAN" value="50" oninput="saveData()">
        </div>

        <div class="box" style="border-left: 1px solid #555; padding-left: 15px;">
            <label for="mapUpload" style="background:#e67e22; padding:6px 12px; border-radius:4px; cursor:pointer; font-weight:bold; font-size:14px;">🖼️ 上傳地圖</label>
            <input type="file" id="mapUpload" accept="image/*" style="display:none;" onchange="uploadMap(event)">
            <button onclick="clearMap()" style="background:#c0392b;">重設</button>
        </div>

        <div class="box" style="border-left: 1px solid #555; padding-left: 15px;">
            <button onclick="rollDice(100)">D100</button>
            <button onclick="rollDice(20)" style="background:#27ae60;">D20</button>
            <button onclick="rollDice(6)" style="background:#8e44ad;">D6</button>
            <span class="dice-result" id="diceOutput">--</span>
        </div>
    </div>

    <!-- 畫面中央：完美滿版無拉桿地圖 -->
    <div class="map-container">
        <div id="mapWrapper">
            <!-- 採用百分比 viewBox 繪製法，保證不管螢幕多大都一定是精準 50 等分，絕不卡死 -->
            <svg class="grid-layer" viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://w3.org">
                <defs>
                    <!-- 寬高各 2% 代表 100% / 50 格 = 2% -->
                    <pattern id="trpg-grid" width="2" height="2" patternUnits="userSpaceOnUse">
                        <path d="M 2 0 L 0 0 0 2" fill="none" stroke="rgba(255, 255, 255, 0.25)" stroke-width="0.05"/>
                    </pattern>
                </defs>
                <rect width="100" height="100" fill="url(#trpg-grid)" />
            </svg>
        </div>
    </div>

    <script>
        window.onload = function() {
            if (localStorage.getItem("trpg_name")) document.getElementById("charName").value = localStorage.getItem("trpg_name");
            if (localStorage.getItem("trpg_hp")) document.getElementById("charHP").value = localStorage.getItem("trpg_hp");
            if (localStorage.getItem("trpg_san")) document.getElementById("charSAN").value = localStorage.getItem("trpg_san");
            
            const savedMap = localStorage.getItem("trpg_map_bg");
            if (savedMap) {
                document.getElementById("mapWrapper").style.backgroundImage = `url('${savedMap}')`;
            }
        }

        function saveData() {
            localStorage.setItem("trpg_name", document.getElementById("charName").value);
            localStorage.setItem("trpg_hp", document.getElementById("charHP").value);
            localStorage.setItem("trpg_san", document.getElementById("charSAN").value);
        }

        function uploadMap(event) {
            const file = event.target.files[0]; // 修正多選錯誤，確保只抓第一張圖
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const imgData = e.target.result;
                document.getElementById("mapWrapper").style.backgroundImage = `url('${imgData}')`;
                try {
                    localStorage.setItem("trpg_map_bg", imgData);
                } catch (error) {
                    alert("地圖已成功更新顯示！但因圖片檔案較大，下次重新開啟網頁時可能需要重新上傳。");
                }
            };
            reader.readAsDataURL(file);
        }

        function clearMap() {
            document.getElementById("mapWrapper").style.backgroundImage = "none";
            localStorage.removeItem("trpg_map_bg");
            document.getElementById("mapUpload").value = "";
        }

        function rollDice(sides) {
            const result = Math.floor(Math.random() * sides) + 1;
            document.getElementById("diceOutput").innerText = `D${sides}➔${result}`;
        }
    </script>
</body>
</html>
