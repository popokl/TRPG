<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私人 TRPG 平台</title>
    <style>
        /* 重置預設邊距，讓畫面填滿視窗 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            height: 100vh;
            overflow: hidden; /* 防止整個網頁滾動 */
        }

        /* 網頁主架構：使用 CSS Grid 劃分 5 大區塊 */
        .trpg-layout {
            display: grid;
            grid-template-areas:
                "toolbar toolbar toolbar"
                "left-panel map-area right-panel"
                "gm-tools gm-tools gm-tools";
            grid-template-columns: 300px 1fr 300px; /* 左右側邊欄 300px，中間自適應 */
            grid-template-rows: 60px 1fr 150px; /* 上方 60px，下方 150px，中間自適應 */
            height: 100vh;
            gap: 2px;
            background-color: #000; /* 區塊之間的縫隙顏色 */
        }

        /* 各區塊共通樣式 */
        .panel {
            background-color: #2d2d2d;
            padding: 15px;
            overflow-y: auto; /* 內容過多時可獨立捲動 */
        }

        /* 1. 玩家工具列 (上方) */
        .toolbar { grid-area: toolbar; background-color: #383838; }

        /* 2. 角色資訊 (左方) */
        .left-panel { grid-area: left-panel; border-right: 1px solid #444; }

        /* 3. 地圖區域 (中間) */
        .map-area {
            grid-area: map-area;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto; /* 允許地圖拖曳或滾動 */
            position: relative;
        }

        /* 50x50 地圖網格本身 */
        .grid-map {
            display: grid;
            /* 定義 50 欄 x 50 列，每格 40x40 像素 */
            grid-template-columns: repeat(50, 40px);
            grid-template-rows: repeat(50, 40px);
            background-color: #222;
            border: 1px solid #555;
        }

        /* 單一網格的樣式 */
        .grid-cell {
            border: 1px solid #333;
            width: 40px;
            height: 40px;
            transition: background-color 0.2s;
        }

        .grid-cell:hover {
            background-color: #4a6fa5;
            cursor: pointer;
        }

        /* 4. 狀態資訊 (右方) */
        .right-panel { grid-area: right-panel; border-left: 1px solid #444; }

        /* 5. GM工具 (下方) */
        .gm-tools {
            grid-area: gm-tools;
            background-color: #4a2323; /* 用偏紅色調區分 GM 區域 */
            border-top: 2px solid #ff4444;
        }
        
        /* 權限控制用的 Class */
        .hidden-for-player {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="trpg-layout">
        <!-- 網頁上方：玩家工具列 -->
        <header class="panel toolbar">
            <h2>玩家工具列 (擲骰、測量距離等)</h2>
        </header>

        <!-- 網頁左方：角色資訊 -->
        <aside class="panel left-panel">
            <h2>角色資訊</h2>
            <p>HP: 100 / 100</p>
            <p>MP: 50 / 50</p>
            <!-- 這裡未來可以放角色屬性卡 -->
        </aside>

        <!-- 網頁中間：50X50 地圖網格 -->
        <main class="map-area">
            <div class="grid-map" id="map">
                <!-- 網格由 JavaScript 動態生成 -->
            </div>
        </main>

        <!-- 網頁右方：狀態資訊 -->
        <aside class="panel right-panel">
            <h2>狀態資訊</h2>
            <p>回合列表、增益/減益狀態、戰鬥紀錄...</p>
        </aside>

        <!-- 網頁下方：GM工具 -->
        <footer class="panel gm-tools" id="gmPanel">
            <h2>GM 工具 (僅 GM 可見)</h2>
            <p>生成怪物、切換地圖、調整玩家數值...</p>
        </footer>
    </div>

    <script>
        // 1. 動態生成 50x50 的地圖網格 (共 2500 格)
        const mapContainer = document.getElementById('map');
        const MAP_SIZE = 50;
        const TOTAL_CELLS = MAP_SIZE * MAP_SIZE;

        for (let i = 0; i < TOTAL_CELLS; i++) {
            const cell = document.createElement('div');
            cell.classList.add('grid-cell');
            
            // 可以給每個格子加上座標 (x, y) 方便未來計算
            const x = i % MAP_SIZE;
            const y = Math.floor(i / MAP_SIZE);
            cell.dataset.x = x;
            cell.dataset.y = y;

            // 測試用：點擊格子時印出座標
            cell.addEventListener('click', () => {
                console.log(`點擊了網格：X:${x}, Y:${y}`);
            });

            mapContainer.appendChild(cell);
        }

        // 2. 模擬權限控制 (前端版)
        // 在真實環境中，這會由後端登入狀態決定，並透過 WebSocket 同步。
        // 這裡我們先設定一個變數來測試版面。
        const isGM = true; // 設為 false 看看玩家視角

        if (!isGM) {
            document.getElementById('gmPanel').classList.add('hidden-for-player');
            // 如果隱藏了 GM 工具，可以動態調整版面高度把下方補滿
            document.querySelector('.trpg-layout').style.gridTemplateRows = "60px 1fr 0px";
        }
    </script>
</body>
</html>
