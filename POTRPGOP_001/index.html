<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私人 TRPG 平台</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #2b2b2b;
            color: #ffffff;
            overflow: hidden;
            user-select: none;
        }

        /* 鎖定未加入玩家的互動限制 */
        .locked-for-unjoined {
            pointer-events: none !important;
            opacity: 0.4;
            transition: opacity 0.3s;
        }

        /* 1. 地圖區域 (底層) */
        .map-area {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            background-color: #222222;
            z-index: 1;
            cursor: default;
        }

        .grid-map {
            position: relative;
            display: grid;
            grid-template-columns: repeat(50, 40px);
            grid-template-rows: repeat(50, 40px);
            background-color: #333333;
            background-size: cover;
            background-position: center;
            border: 2px solid #000;
            width: fit-content;
            margin: 100px auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            transform-origin: center center;
            transition: transform 0.05s ease-out;
        }

        .grid-cell {
            background-color: transparent;
            border: 1.5px solid #000;
            width: 40px; height: 40px;
            transition: background-color 0.2s;
        }

        .grid-cell:hover {
            background-color: rgba(74, 111, 165, 0.4);
            cursor: pointer;
        }

        /* 棋子樣式 */
        .map-token {
            position: absolute;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.7);
            overflow: hidden;
            cursor: grab;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #333;
            transition: opacity 0.2s;
        }
        .map-token:active {
            cursor: grabbing;
        }
        .map-token.selected {
            border-color: #ffcc00;
            box-shadow: 0 0 10px #ffcc00;
        }
        .map-token.dying {
            opacity: 0.4;
        }
        .map-token img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        /* 右下角地圖重設按鈕 */
        .reset-map-btn {
            position: fixed;
            bottom: 40px;
            right: 25px;
            width: 50px;
            height: 50px;
            background-color: #2d2d2d;
            color: white;
            border: 1px solid #555;
            border-radius: 50%;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: background-color 0.2s, transform 0.2s;
        }
        .reset-map-btn:hover {
            background-color: #444;
            transform: scale(1.05);
        }

        /* 浮動 UI 通用設定 */
        .floating-ui {
            position: fixed;
            z-index: 100;
            border: 1px solid #444;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.7);
        }

        /* 2. 玩家工具列 (上方) */
        .toolbar {
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(45, 45, 45, 0.95);
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .toolbar-title {
            font-weight: bold;
            margin-right: 5px;
            color: #ccc;
            font-size: 14px;
        }

        .toolbar button {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .toolbar button:hover { background: #555; }

        /* 側邊面板通用設定 */
        .side-panel {
            top: 50%;
            display: flex;
            align-items: stretch;
            background: rgba(30, 30, 30, 0.95);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 8px;
        }

        .panel-content {
            width: 320px;
            padding: 20px;
            min-height: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .panel-content h3 {
            margin-bottom: 15px;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
            font-size: 16px;
        }

        .toggle-btn {
            width: 40px;
            background: #4a6fa5;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 14px;
            writing-mode: vertical-lr;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toggle-btn:hover { background: #5c85c2; }

        /* 3. 角色資訊 (左方) */
        .left-panel {
            left: 0;
            transform: translate(calc(-100% + 40px), -50%);
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }
        .left-panel.open {
            transform: translate(0, -50%);
        }
        .left-panel .toggle-btn {
            border-top-right-radius: 8px;
            border-bottom-right-radius: 8px;
        }

        /* 角色卡片樣式 */
        .player-card {
            background: #222;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            color: #ffcc00;
        }

        .player-stats {
            display: flex;
            gap: 6px;
            font-size: 13px;
        }

        .stat-box {
            padding: 4px 6px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            flex: 1;
        }

        .hp-box { background-color: #ffcccc; color: #333; }
        .mp-box { background-color: #cce5ff; color: #333; }
        .shield-box { background-color: #d4edda; color: #333; }

        .stat-box label {
            display: flex;
            align-items: center;
            gap: 2px;
            font-weight: bold;
            font-size: 12px;
            width: 100%;
        }

        .stat-input {
            width: 100%;
            background: #ffffff;
            color: #333;
            border: 1px solid #ccc;
            padding: 2px;
            border-radius: 3px;
            text-align: center;
            font-weight: bold;
        }

        .action-btn {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            text-align: center;
        }
        .action-btn:hover { background: #444; }

        /* 右鍵彈出選單共用 */
        .context-menu {
            position: fixed;
            background: #2d2d2d;
            border: 1px solid #555;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: none;
            z-index: 400;
            padding: 4px 0;
            min-width: 100px;
        }

        .context-menu-item {
            padding: 8px 15px;
            cursor: pointer;
            font-size: 14px;
            color: #fff;
        }

        .context-menu-item:hover {
            background: #5a1a1a;
        }

        .context-menu-item.disabled {
            color: #666;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* 4. 狀態資訊 (右方) */
        .right-panel {
            right: 0;
            transform: translate(calc(100% - 40px), -50%);
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
        }
        .right-panel.open {
            transform: translate(0, -50%);
        }
        .right-panel .toggle-btn {
            border-top-left-radius: 8px;
            border-bottom-left-radius: 8px;
        }

        /* 5. GM 工具 (下方) */
        .gm-panel {
            bottom: 0;
            left: 50%;
            transform: translate(-50%, calc(100% - 30px));
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: none;
            box-shadow: none;
            background: transparent;
        }

        .gm-panel:hover,
        .gm-panel.force-open {
            transform: translate(-50%, 0);
        }

        .gm-trigger {
            background: #5a1a1a;
            border: 1px solid #883333;
            border-bottom: none;
            color: white;
            height: 30px;
            padding: 0 40px;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.5);
        }

        .gm-content {
            background: rgba(60, 25, 25, 0.95);
            border: 1px solid #883333;
            border-bottom: none;
            width: 600px;
            height: 180px;
            padding: 20px;
            border-radius: 8px 8px 0 0;
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.5);
        }

        .gm-content h3 {
            font-size: 16px;
            margin-bottom: 12px;
            border-bottom: 1px solid #773333;
            padding-bottom: 4px;
        }

        .gm-buttons {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            position: relative;
        }

        .gm-buttons button {
            background: #4a2323;
            color: white;
            border: 1px solid #884444;
            padding: 10px 0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .gm-buttons button:hover { background: #6b3333; }

        /* 互動視窗 (Modal) 樣式 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 400;
        }

        .modal-box {
            background: #2d2d2d;
            border: 1px solid #555;
            width: 420px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #444;
            padding-bottom: 8px;
        }

        .modal-header h3 { font-size: 16px; }

        .modal-close-btn {
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 18px;
            cursor: pointer;
        }
        .modal-close-btn:hover { color: white; }

        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .upload-btn, .modal-action-btn {
            background: #4a2323;
            color: white;
            border: 1px solid #884444;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            width: 100%;
        }
        .upload-btn:hover, .modal-action-btn:hover { background: #6b3333; }

        .preview-area {
            width: 100%;
            height: 220px;
            background: #1a1a1a;
            border: 1px dashed #555;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px;
            color: #777;
            font-size: 14px;
        }

        .preview-area img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .preview-area .data-thumb {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.1s;
        }
        .preview-area .data-thumb:hover {
            transform: scale(1.08);
            border-color: #ffcc00;
        }

        .circular-preview-container {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #884444;
            margin: 0 auto;
            background: #1a1a1a;
        }
        .circular-preview-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 角色卡視窗專用區塊樣式 */
        .char-section-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            background: #222;
            padding: 8px 12px;
            border: 1px solid #444;
            border-radius: 6px;
        }
        .char-section-row label {
            font-weight: bold;
            font-size: 14px;
            width: 80px;
        }
        .char-section-row input, .char-section-row .display-box {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #555;
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 14px;
        }
        .char-group-box {
            background: #222;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 6px;
        }
        .char-group-box h4 {
            font-size: 14px;
            border-bottom: 1px solid #444;
            padding-bottom: 4px;
            margin-bottom: 8px;
            color: #ccc;
        }
        .dropdown-menu-custom {
            position: absolute;
            background: #2d2d2d;
            border: 1px solid #555;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: none;
            z-index: 500;
            padding: 4px 0;
            width: 140px;
            right: 0;
            top: 100%;
        }
        .dropdown-item-custom {
            padding: 6px 12px;
            cursor: pointer;
            font-size: 13px;
            color: #fff;
        }
        .dropdown-item-custom:hover {
            background: #4a6fa5;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- 底層：地圖區域 -->
    <main class="map-area" id="mapArea">
        <div class="grid-map" id="map"></div>
    </main>

    <!-- 右下角地圖重設按鈕 -->
    <button class="reset-map-btn" id="resetMapBtn" title="重設地圖">↺</button>

    <!-- 上方：玩家工具列 -->
    <div class="floating-ui toolbar">
        <span class="toolbar-title">玩家工具列</span>
        <button>擲骰</button>
        <button>移動角色</button>
        <button>測量路徑</button>
        <button>技能範圍</button>
        <button>畫筆</button>
    </div>

    <!-- 左方：角色資訊 -->
    <div class="floating-ui side-panel left-panel" id="leftPanel">
        <div class="panel-content">
            <h3>角色資訊</h3>
            <!-- 「加入」按鍵，僅玩家可見與點擊 -->
            <button class="action-btn" id="joinBtn" style="margin-bottom: 12px;">加入</button>
            <div id="playerList"></div>
        </div>
        <button class="toggle-btn" onclick="togglePanel('leftPanel')">角色資訊</button>
    </div>

    <!-- 玩家卡片右鍵選單 -->
    <div class="context-menu" id="playerContextMenu">
        <div class="context-menu-item" id="contextRemovePlayer">剔除</div>
    </div>

    <!-- 棋子右鍵選單 -->
    <div class="context-menu" id="tokenContextMenu">
        <div class="context-menu-item" id="tokenContextDying">瀕死</div>
        <div class="context-menu-item disabled" id="tokenContextRevive">復活</div>
        <div class="context-menu-item" id="tokenContextRemove">剔除</div>
    </div>

    <!-- 右方：狀態資訊 -->
    <div class="floating-ui side-panel right-panel" id="rightPanel">
        <button class="toggle-btn" onclick="togglePanel('rightPanel')">狀態資訊</button>
        <div class="panel-content">
            <h3>狀態與紀錄</h3>
            <p>[系統] 遊戲開始</p>
            <p>[玩家] 擲過了 18</p>
        </div>
    </div>

    <!-- 下方：GM 工具 -->
    <div class="floating-ui gm-panel" id="gmPanel">
        <div class="gm-trigger">GM 工具列</div>
        <div class="gm-content">
            <h3>GM 控制台</h3>
            <div class="gm-buttons" id="gmButtonsContainer">
                <button data-tool="地圖">地圖</button>
                <button data-tool="角色">角色</button>
                <button data-tool="敵人">敵人</button>
                <button data-tool="道具">道具</button>
                <button data-tool="狀態">狀態</button>
                <button data-tool="筆記">筆記</button>
            </div>
        </div>
    </div>

    <!-- GM 素材庫視窗 (Modal) -->
    <div class="modal-overlay" id="gmModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modalTitle">素材庫</h3>
                <button class="modal-close-btn" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <input type="file" id="fileInput" accept="image/*" class="hidden">
                <button class="upload-btn" id="uploadTriggerBtn">上傳圖片</button>
                <div class="preview-area" id="previewArea">
                    <span>尚無上傳圖片資料</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 編輯角色卡視窗 (Modal) -->
    <div class="modal-overlay" id="charModal">
        <div class="modal-box" style="width: 550px; max-height: 85vh; display: flex; flex-direction: column;">
            <div class="modal-header">
                <h3>編輯角色卡</h3>
                <button class="modal-close-btn" id="closeCharModalBtn">&times;</button>
            </div>
            <div class="modal-body" style="overflow-y: auto; flex: 1; gap: 12px; padding-right: 5px;">
                
                <!-- 1. 名字 -->
                <div class="char-section-row">
                    <label>名字</label>
                    <input type="text" id="inputCharName" value="冒險者" disabled>
                    <button class="action-btn" id="editNameBtn" style="width: auto; padding: 4px 10px;">編輯</button>
                </div>

                <!-- 2. 種族 -->
                <div class="char-section-row" style="position: relative;">
                    <label>種族</label>
                    <div id="displayRace" class="display-box">吸血鬼</div>
                    <button class="action-btn" id="raceToggleBtn" style="width: auto; padding: 4px 10px;">選擇</button>
                    <div class="dropdown-menu-custom" id="raceDropdown">
                        <div class="dropdown-item-custom">吸血鬼</div>
                        <div class="dropdown-item-custom">精靈</div>
                        <div class="dropdown-item-custom">魔人</div>
                        <div class="dropdown-item-custom">獸人</div>
                        <div class="dropdown-item-custom">離群半獸人</div>
                        <div class="dropdown-item-custom">矮人</div>
                        <div class="dropdown-item-custom">半身人</div>
                        <div class="dropdown-item-custom">龍裔</div>
                    </div>
                </div>

                <!-- 3. 戰鬥職業 -->
                <div class="char-section-row" style="position: relative;">
                    <label>戰鬥職業</label>
                    <div id="displayClass" class="display-box">聖盾衛</div>
                    <button class="action-btn" id="classToggleBtn" style="width: auto; padding: 4px 10px;">選擇</button>
                    <div class="dropdown-menu-custom" id="classDropdown">
                        <div class="dropdown-item-custom">聖盾衛</div>
                        <div class="dropdown-item-custom">野蠻鬥士</div>
                        <div class="dropdown-item-custom">德魯伊</div>
                        <div class="dropdown-item-custom">鬼浪侍</div>
                        <div class="dropdown-item-custom">暗殺者</div>
                        <div class="dropdown-item-custom">元素巫師</div>
                        <div class="dropdown-item-custom">吟遊舞者</div>
                        <div class="dropdown-item-custom">疫醫</div>
                        <div class="dropdown-item-custom">萬靈賢者</div>
                    </div>
                </div>

                <!-- 4. 數值 -->
                <div class="char-group-box">
                    <h4>數值</h4>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
                        <div><label style="font-size:12px; display:block; margin-bottom:2px;">力量</label><input type="number" class="stat-input stat-field" value="10"></div>
                        <div><label style="font-size:12px; display:block; margin-bottom:2px;">敏捷</label><input type="number" class="stat-input stat-field" value="10"></div>
                        <div><label style="font-size:12px; display:block; margin-bottom:2px;">體質</label><input type="number" class="stat-input stat-field" value="10"></div>
                        <div><label style="font-size:12px; display:block; margin-bottom:2px;">智力</label><input type="number" class="stat-input stat-field" value="10"></div>
                        <div><label style="font-size:12px; display:block; margin-bottom:2px;">感知</label><input type="number" class="stat-input stat-field" value="10"></div>
                        <div><label style="font-size:12px; display:block; margin-bottom:2px;">魅力</label><input type="number" class="stat-input stat-field" value="10"></div>
                    </div>
                </div>

                <!-- 5. 動作熟練值 -->
                <div class="char-group-box">
                    <h4>動作熟練值</h4>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
                        <div><label style="font-size:11px; display:block; margin-bottom:2px;">運動</label><input type="number" class="stat-input prof-field" value="0"></div>
                        <div><label style="font-size:11px; display:block; margin-bottom:2px;">特技</label><input type="number" class="stat-input prof-field" value="0"></div>
                        <div><label style="font-size:11px; display:block; margin-bottom:2px;">巧手</label><input type="number" class="stat-input prof-field" value="0"></div>
                        <div><label style="font-size:11px; display:block; margin-bottom:2px;">躲藏</label><input type="number" class="stat-input prof-field" value="0"></div>
                        <div><label style="font-size:11px; display:block; margin-bottom:2px;">智慧</label><input type="number" class="stat-input prof-field" value="0"></div>
                        <div><label style="font-size:11px; display:block; margin-bottom:2px;">奧術</label><input type="number" class="stat-input prof-field" value="0"></div>
                        <div><label style="font-size:11px; display:block; margin-bottom:2px;">烹飪</label><input type="number" class="stat-input prof-field" value="0"></div>
                        <div><label style="font-size:11px; display:block; margin-bottom:2px;">急救</label><input type="number" class="stat-input prof-field" value="0"></div>
                        <div><label style="font-size:11px; display:block; margin-bottom:2px;">訓獸</label><input type="number" class="stat-input prof-field" value="0"></div>
                        <div><label style="font-size:11px; display:block; margin-bottom:2px;">察覺</label><input type="number" class="stat-input prof-field" value="0"></div>
                        <div><label style="font-size:11px; display:block; margin-bottom:2px;">調查</label><input type="number" class="stat-input prof-field" value="0"></div>
                        <div><label style="font-size:11px; display:block; margin-bottom:2px;">求生</label><input type="number" class="stat-input prof-field" value="0"></div>
                        <div><label style="font-size:11px; display:block; margin-bottom:2px;">表演</label><input type="number" class="stat-input prof-field" value="0"></div>
                        <div><label style="font-size:11px; display:block; margin-bottom:2px;">說服</label><input type="number" class="stat-input prof-field" value="0"></div>
                        <div><label style="font-size:11px; display:block; margin-bottom:2px;">威嚇</label><input type="number" class="stat-input prof-field" value="0"></div>
                    </div>
                </div>

                <!-- 6. 物品 (20格，不可編輯) -->
                <div class="char-group-box">
                    <h4>物品 (20格)</h4>
                    <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;" id="itemGridBox">
                        <!-- 動態生成 20 格 -->
                    </div>
                </div>

            </div>
            <div style="display: flex; justify-content: flex-end; margin-top: 10px;">
                <button class="modal-action-btn" id="charConfirmBtn" style="width: auto; padding: 6px 20px;">確認</button>
            </div>
        </div>
    </div>

    <!-- 地圖切換確認視窗 -->
    <div class="modal-overlay" id="mapConfirmModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3>地圖切換確認</h3>
                <button class="modal-close-btn" id="closeMapConfirmBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="preview-area" id="mapPreviewArea"></div>
                <button class="modal-action-btn" id="mapConfirmSwitchBtn">確認切換</button>
            </div>
        </div>
    </div>

    <!-- 角色/敵人棋子建立視窗 -->
    <div class="modal-overlay" id="tokenModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="tokenModalTitle">建立棋子</h3>
                <button class="modal-close-btn" id="closeTokenModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="circular-preview-container">
                    <img id="tokenPreviewImg" src="" alt="預覽">
                </div>
                <button class="modal-action-btn" id="tokenConfirmBtn">確認</button>
            </div>
        </div>
    </div>

    <script>
        // 權限控制 (透過網址參數自動區分 GM 與玩家)
        const urlParams = new URLSearchParams(window.location.search);
        const isGM = urlParams.get('role') === 'gm'; 

        // 即時同步頻道設定
        const syncChannel = new BroadcastChannel('trpg_sync_channel');

        // 資料儲存：分類圖片庫
        const gmImages = {
            地圖: [],
            角色: [],
            敵人: [],
            道具: [],
            狀態: [],
            筆記: []
        };

        // 1. 初始化 50x50 地圖
        const mapContainer = document.getElementById('map');
        const MAP_SIZE = 50;
        const TOTAL_CELLS = MAP_SIZE * MAP_SIZE;

        for (let i = 0; i < TOTAL_CELLS; i++) {
            const cell = document.createElement('div');
            cell.classList.add('grid-cell');
            
            const x = i % MAP_SIZE;
            const y = Math.floor(i / MAP_SIZE);
            cell.dataset.x = x;
            cell.dataset.y = y;

            cell.addEventListener('click', () => {
                console.log(`點擊座標 X:${x}, Y:${y}`);
            });

            mapContainer.appendChild(cell);
        }

        // 2. 側邊面板開關
        function togglePanel(panelId) {
            const panel = document.getElementById(panelId);
            panel.classList.toggle('open');
        }

        // 3. 玩家加入機制與角色卡互動邏輯
        const joinBtn = document.getElementById('joinBtn');
        const playerList = document.getElementById('playerList');
        const playerContextMenu = document.getElementById('playerContextMenu');
        const charModal = document.getElementById('charModal');
        const closeCharModalBtn = document.getElementById('closeCharModalBtn');
        const charConfirmBtn = document.getElementById('charConfirmBtn');
        
        let activePlayerCard = null;
        let isPlayerJoined = false;

        // 若為 GM，隱藏 GM 面板以外的加入按鈕；若為玩家，預設鎖定其他所有功能
        if (isGM) {
            document.getElementById('gmPanel').classList.remove('hidden');
            if (joinBtn) joinBtn.style.display = 'none'; // GM 不需要加入按鈕
        } else {
            document.getElementById('gmPanel').classList.add('hidden');
            // 玩家未加入前，鎖定地圖區域、上方工具列、右側面板
            lockAllFeatures(true);
        }

        function lockAllFeatures(lock) {
            const targets = [
                document.getElementById('mapArea'),
                document.querySelector('.toolbar'),
                document.getElementById('rightPanel'),
                document.getElementById('resetMapBtn')
            ];
            targets.forEach(el => {
                if (el) {
                    if (lock) {
                        el.classList.add('locked-for-unjoined');
                    } else {
                        el.classList.remove('locked-for-unjoined');
                    }
                }
            });
        }

        // 生成 20 格物品 (不可編輯)
        const itemGridBox = document.getElementById('itemGridBox');
        for (let i = 0; i < 20; i++) {
            const itemBox = document.createElement('div');
            itemBox.style.cssText = 'height: 35px; background: #151515; border: 1px solid #444; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #666;';
            itemBox.textContent = i + 1;
            itemGridBox.appendChild(itemBox);
        }

        // 點擊「加入」按鍵開啟編輯角色卡視窗
        if (joinBtn) {
            joinBtn.addEventListener('click', () => {
                charModal.style.display = 'flex';
            });
        }

        closeCharModalBtn.addEventListener('click', () => {
            charModal.style.display = 'none';
        });

        // 名字編輯按鍵
        const inputCharName = document.getElementById('inputCharName');
        const editNameBtn = document.getElementById('editNameBtn');
        editNameBtn.addEventListener('click', () => {
            inputCharName.disabled = !inputCharName.disabled;
            if (!inputCharName.disabled) inputCharName.focus();
        });

        // 種族下拉選單控制
        const raceToggleBtn = document.getElementById('raceToggleBtn');
        const raceDropdown = document.getElementById('raceDropdown');
        const displayRace = document.getElementById('displayRace');

        raceToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            raceDropdown.style.display = raceDropdown.style.display === 'block' ? 'none' : 'block';
            classDropdown.style.display = 'none';
        });

        raceDropdown.querySelectorAll('.dropdown-item-custom').forEach(item => {
            item.addEventListener('click', () => {
                displayRace.textContent = item.textContent;
                raceDropdown.style.display = 'none';
            });
        });

        // 戰鬥職業下拉選單控制
        const classToggleBtn = document.getElementById('classToggleBtn');
        const classDropdown = document.getElementById('classDropdown');
        const displayClass = document.getElementById('displayClass');

        classToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            classDropdown.style.display = classDropdown.style.display === 'block' ? 'none' : 'block';
            raceDropdown.style.display = 'none';
        });

        classDropdown.querySelectorAll('.dropdown-item-custom').forEach(item => {
            item.addEventListener('click', () => {
                displayClass.textContent = item.textContent;
                classDropdown.style.display = 'none';
            });
        });

        window.addEventListener('click', () => {
            raceDropdown.style.display = 'none';
            classDropdown.style.display = 'none';
            playerContextMenu.style.display = 'none';
            tokenContextMenu.style.display = 'none';
        });

        // 角色卡確認按鍵
        charConfirmBtn.addEventListener('click', () => {
            const name = inputCharName.value.trim() || '未命名冒險者';
            const race = displayRace.textContent;
            const charClass = displayClass.textContent;

            // 建立玩家角色卡片顯示在左側面板
            const playerCard = document.createElement('div');
            playerCard.className = 'player-card';
            playerCard.innerHTML = `
                <div class="player-header">
                    <span>${name} (${race} / ${charClass})</span>
                </div>
                <div class="player-stats">
                    <div class="stat-box hp-box">
                        <label>HP: <input type="number" class="stat-input" value="20"></label>
                    </div>
                    <div class="stat-box mp-box">
                        <label>MP: <input type="number" class="stat-input" value="10"></label>
                    </div>
                    <div class="stat-box shield-box">
                        <label>護盾: <input type="number" class="stat-input" value="0"></label>
                    </div>
                </div>
            `;

            playerCard.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                if (isGM) {
                    activePlayerCard = playerCard;
                    tokenContextMenu.style.display = 'none';
                    playerContextMenu.style.display = 'block';
                    playerContextMenu.style.left = `${e.clientX}px`;
                    playerContextMenu.style.top = `${e.clientY}px`;
                }
            });

            playerList.innerHTML = ''; // 限制每位玩家擁有自己的卡片
            playerList.appendChild(playerCard);

            // 解除玩家功能鎖定
            isPlayerJoined = true;
            lockAllFeatures(false);
            if (joinBtn) joinBtn.style.display = 'none'; // 加入後隱藏加入按鍵
            charModal.style.display = 'none';

            // 同步至其他畫面
            syncChannel.postMessage({
                type: 'ADD_PLAYER_CARD',
                name, race, charClass
            });
        });

        document.getElementById('contextRemovePlayer').addEventListener('click', () => {
            if (activePlayerCard) {
                activePlayerCard.remove();
                activePlayerCard = null;
            }
            playerContextMenu.style.display = 'none';
        });

        // 4. 地圖拖曳平移、縮放與重設功能
        const mapArea = document.getElementById('mapArea');
        let currentScale = 1.0;
        let panX = 0;
        let panY = 0;
        let isDragging = false;
        let startX, startY;
        const minScale = 0.05;
        const maxScale = 3.0;

        function updateMapTransform() {
            mapContainer.style.transform = `translate(${panX}px, ${panY}px) scale(${currentScale})`;
        }

        mapArea.addEventListener('mousedown', (e) => {
            if (e.button === 0 && e.target === mapArea) {
                isDragging = true;
                startX = e.clientX - panX;
                startY = e.clientY - panY;
                mapArea.style.cursor = 'grabbing';
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            panX = e.clientX - startX;
            panY = e.clientY - startY;
            updateMapTransform();
        });

        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                mapArea.style.cursor = 'default';
            }
        });

        mapArea.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (e.deltaY < 0) {
                currentScale += 0.1;
                if (currentScale > maxScale) currentScale = maxScale;
            } else {
                currentScale -= 0.1;
                if (currentScale < minScale) currentScale = minScale;
            }
            updateMapTransform();
        }, { passive: false });

        const resetMapBtn = document.getElementById('resetMapBtn');
        resetMapBtn.addEventListener('click', () => {
            currentScale = 1.0;
            panX = 0;
            panY = 0;
            updateMapTransform();
        });

        // 5. GM 工具列與素材庫視窗設定
        const gmModal = document.getElementById('gmModal');
        const modalTitle = document.getElementById('modalTitle');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const gmButtons = document.querySelectorAll('#gmButtonsContainer button');
        const fileInput = document.getElementById('fileInput');
        const uploadTriggerBtn = document.getElementById('uploadTriggerBtn');
        const previewArea = document.getElementById('previewArea');

        let currentToolCategory = '';

        function renderMaterialLibrary() {
            const images = gmImages[currentToolCategory];
            if (!images || images.length === 0) {
                previewArea.innerHTML = '<span style="color: #888;">尚無上傳圖片資料</span>';
                return;
            }
            previewArea.innerHTML = '';
            images.forEach((imgSrc) => {
                const thumb = document.createElement('img');
                thumb.src = imgSrc;
                thumb.className = 'data-thumb';
                thumb.addEventListener('click', () => {
                    gmModal.style.display = 'none';
                    handleImageSelection(currentToolCategory, imgSrc);
                });
                previewArea.appendChild(thumb);
            });
        }

        gmButtons.forEach(btn => {
            const toolName = btn.getAttribute('data-tool');
            btn.addEventListener('click', () => {
                currentToolCategory = toolName;
                modalTitle.textContent = `素材庫 - ${toolName}`;
                fileInput.value = '';
                renderMaterialLibrary();
                gmModal.style.display = 'flex';
            });
        });

        closeModalBtn.addEventListener('click', () => {
            gmModal.style.display = 'none';
        });

        gmModal.addEventListener('click', (e) => {
            if (e.target === gmModal) {
                gmModal.style.display = 'none';
            }
        });

        uploadTriggerBtn.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const imgSrc = event.target.result;
                    gmImages[currentToolCategory].push(imgSrc);
                    renderMaterialLibrary();
                    fileInput.value = '';
                };
                reader.readAsDataURL(file);
            }
        });

        // 6. 點擊圖片後的後續動作邏輯
        const mapConfirmModal = document.getElementById('mapConfirmModal');
        const mapPreviewArea = document.getElementById('mapPreviewArea');
        const closeMapConfirmBtn = document.getElementById('closeMapConfirmBtn');
        const mapConfirmSwitchBtn = document.getElementById('mapConfirmSwitchBtn');
        
        const tokenModal = document.getElementById('tokenModal');
        const tokenPreviewImg = document.getElementById('tokenPreviewImg');
        const closeTokenModalBtn = document.getElementById('closeTokenModalBtn');
        const tokenConfirmBtn = document.getElementById('tokenConfirmBtn');
        const tokenModalTitle = document.getElementById('tokenModalTitle');

        let selectedImageForAction = '';

        function handleImageSelection(category, imgSrc) {
            selectedImageForAction = imgSrc;

            if (category === '地圖') {
                mapPreviewArea.innerHTML = `<img src="${imgSrc}" alt="地圖預覽">`;
                mapConfirmModal.style.display = 'flex';
            } else if (category === '角色' || category === '敵人') {
                tokenModalTitle.textContent = `建立${category}棋子`;
                tokenPreviewImg.src = imgSrc;
                tokenModal.style.display = 'flex';
            } else {
                alert(`點擊了 ${category} 圖片`);
            }
        }

        closeMapConfirmBtn.addEventListener('click', () => {
            mapConfirmModal.style.display = 'none';
        });

        mapConfirmSwitchBtn.addEventListener('click', () => {
            mapContainer.style.backgroundImage = `url('${selectedImageForAction}')`;
            mapConfirmModal.style.display = 'none';
            syncChannel.postMessage({ type: 'CHANGE_MAP', imgSrc: selectedImageForAction });
            alert('已成功切換網格地圖背景！');
        });

        closeTokenModalBtn.addEventListener('click', () => {
            tokenModal.style.display = 'none';
        });

        tokenConfirmBtn.addEventListener('click', () => {
            const tokenId = 'token_' + Date.now() + '_' + Math.random().toString(36).substring(2, 9);
            createToken(tokenId, selectedImageForAction, 25 * 40, 25 * 40, 1, false);
            
            syncChannel.postMessage({
                type: 'CREATE_TOKEN',
                id: tokenId,
                imgSrc: selectedImageForAction,
                left: 25 * 40,
                top: 25 * 40,
                gridSize: 1,
                isDying: false
            });

            tokenModal.style.display = 'none';
        });

        // 7. 棋子生成、貼齊網格移動與右鍵選單邏輯
        let activeToken = null;
        const tokenContextMenu = document.getElementById('tokenContextMenu');
        const tokenContextDying = document.getElementById('tokenContextDying');
        const tokenContextRevive = document.getElementById('tokenContextRevive');
        const tokenContextRemove = document.getElementById('tokenContextRemove');

        function createToken(tokenId, imgSrc, leftPx, topPx, gridSize, isDying) {
            const token = document.createElement('div');
            token.className = 'map-token';
            if (isDying) token.classList.add('dying');
            token.dataset.tokenId = tokenId;
            token.dataset.gridSize = gridSize; 
            token.style.width = `${gridSize * 40}px`;
            token.style.height = `${gridSize * 40}px`;
            token.style.left = `${leftPx}px`;
            token.style.top = `${topPx}px`;

            const img = document.createElement('img');
            img.src = imgSrc;
            token.appendChild(img);

            token.addEventListener('mousedown', (e) => {
                if (e.button !== 0) return;
                e.stopPropagation();
                if (activeToken && activeToken !== token) {
                    activeToken.classList.remove('selected');
                }
                activeToken = token;
                token.classList.add('selected');

                let shiftX = e.clientX - token.getBoundingClientRect().left;
                let shiftY = e.clientY - token.getBoundingClientRect().top;
                const mapRect = mapContainer.getBoundingClientRect();

                function onMouseMove(event) {
                    let rawX = (event.clientX - mapRect.left - shiftX) / currentScale;
                    let rawY = (event.clientY - mapRect.top - shiftY) / currentScale;
                    
                    let snappedX = Math.round(rawX / 40) * 40;
                    let snappedY = Math.round(rawY / 40) * 40;

                    token.style.left = `${snappedX}px`;
                    token.style.top = `${snappedY}px`;

                    syncChannel.postMessage({
                        type: 'MOVE_TOKEN',
                        id: tokenId,
                        left: `${snappedX}px`,
                        top: `${snappedY}px`
                    });
                }

                function onMouseUp() {
                    document.removeEventListener('mousemove', onMouseMove);
                }

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp, { once: true });
            });

            token.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (activeToken && activeToken !== token) {
                    activeToken.classList.remove('selected');
                }
                activeToken = token;
                token.classList.add('selected');
                playerContextMenu.style.display = 'none';

                const dyingStatus = token.classList.contains('dying');
                if (dyingStatus) {
                    tokenContextDying.classList.add('disabled');
                    tokenContextRevive.classList.remove('disabled');
                } else {
                    tokenContextDying.classList.remove('disabled');
                    tokenContextRevive.classList.add('disabled');
                }

                tokenContextMenu.style.display = 'block';
                tokenContextMenu.style.left = `${e.clientX}px`;
                tokenContextMenu.style.top = `${e.clientY}px`;
            });

            token.addEventListener('wheel', (e) => {
                e.preventDefault();
                e.stopPropagation();
                let size = parseInt(token.dataset.gridSize);
                if (e.deltaY < 0) {
                    size += 1;
                    if (size > 10) size = 10;
                } else {
                    size -= 1;
                    if (size < 1) size = 1;
                }
                token.dataset.gridSize = size;
                const newSize = size * 40;
                token.style.width = `${newSize}px`;
                token.style.height = `${newSize}px`;

                syncChannel.postMessage({
                    type: 'RESIZE_TOKEN',
                    id: tokenId,
                    gridSize: size
                });
            }, { passive: false });

            mapContainer.appendChild(token);
        }

        tokenContextDying.addEventListener('click', () => {
            if (activeToken && !tokenContextDying.classList.contains('disabled')) {
                activeToken.classList.add('dying');
                const id = activeToken.dataset.tokenId;
                syncChannel.postMessage({ type: 'UPDATE_TOKEN_STATUS', id, status: 'dying' });
            }
            tokenContextMenu.style.display = 'none';
        });

        tokenContextRevive.addEventListener('click', () => {
            if (activeToken && !tokenContextRevive.classList.contains('disabled')) {
                activeToken.classList.remove('dying');
                const id = activeToken.dataset.tokenId;
                syncChannel.postMessage({ type: 'UPDATE_TOKEN_STATUS', id, status: 'normal' });
            }
            tokenContextMenu.style.display = 'none';
        });

        tokenContextRemove.addEventListener('click', () => {
            if (activeToken) {
                const id = activeToken.dataset.tokenId;
                activeToken.remove();
                activeToken = null;
                syncChannel.postMessage({ type: 'REMOVE_TOKEN', id });
            }
            tokenContextMenu.style.display = 'none';
        });

        mapArea.addEventListener('click', (e) => {
            if (e.target === mapArea || e.target.classList.contains('grid-cell') || e.target.id === 'map') {
                if (activeToken) {
                    activeToken.classList.remove('selected');
                    activeToken = null;
                }
            }
        });

        // 8. 監聽廣播頻道以實現即時同步
        syncChannel.onmessage = (event) => {
            const data = event.data;
            if (data.type === 'CHANGE_MAP') {
                mapContainer.style.backgroundImage = `url('${data.imgSrc}')`;
            } else if (data.type === 'CREATE_TOKEN') {
                createToken(data.id, data.imgSrc, parseInt(data.left), parseInt(data.top), data.gridSize, data.isDying);
            } else if (data.type === 'MOVE_TOKEN') {
                const token = document.querySelector(`[data-token-id="${data.id}"]`);
                if (token) {
                    token.style.left = data.left;
                    token.style.top = data.top;
                }
            } else if (data.type === 'RESIZE_TOKEN') {
                const token = document.querySelector(`[data-token-id="${data.id}"]`);
                if (token) {
                    token.dataset.gridSize = data.gridSize;
                    token.style.width = `${data.gridSize * 40}px`;
                    token.style.height = `${data.gridSize * 40}px`;
                }
            } else if (data.type === 'UPDATE_TOKEN_STATUS') {
                const token = document.querySelector(`[data-token-id="${data.id}"]`);
                if (token) {
                    if (data.status === 'dying') {
                        token.classList.add('dying');
                    } else {
                        token.classList.remove('dying');
                    }
                }
            } else if (data.type === 'REMOVE_TOKEN') {
                const token = document.querySelector(`[data-token-id="${data.id}"]`);
                if (token) {
                    token.remove();
                }
            } else if (data.type === 'ADD_PLAYER_CARD') {
                // 同步其他玩家/GM 面板上的角色清單顯示
                const playerCard = document.createElement('div');
                playerCard.className = 'player-card';
                playerCard.innerHTML = `
                    <div class="player-header">
                        <span>${data.name} (${data.race} / ${data.charClass})</span>
                    </div>
                    <div class="player-stats">
                        <div class="stat-box hp-box"><label>HP: <input type="number" class="stat-input" value="20"></label></div>
                        <div class="stat-box mp-box"><label>MP: <input type="number" class="stat-input" value="10"></label></div>
                        <div class="stat-box shield-box"><label>護盾: <input type="number" class="stat-input" value="0"></label></div>
                    </div>
                `;
                playerList.appendChild(playerCard);
            }
        };
    </script>
</body>
</html>
