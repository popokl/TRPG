<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>🎲 TRPG 祕密跑團室 & 可縮放戰術地圖</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #555555; /* 【核心修正】網頁最底層背景改為經典灰色 */
            font-family: sans-serif; 
            color: #fff;
            display: flex;
            flex-direction: column;
        }
        
        /* 上方精簡控制列 */
        .control-panel { 
            display: flex; 
            gap: 15px; 
            padding: 10px 20px;
            background: #2a2a2a;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10;
            align-items: center;
        }
        .box { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        input { background: #333; color: #fff; border: 1px solid #555; padding: 5px; border-radius: 4px; }
        input[type="text"] { width: 90px; }
        input[type="number"] { width: 50px; }
        button { background: #4a90e2; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #357abd; }
        .dice-result { color: #ffcc00; font-weight: bold; margin-left: 5px; }
        
        /* 地圖視窗容器：此處背景也調整為深灰色，維持視覺一體感 */
        .map-container { 
            flex: 1; 
            position: relative; 
            width: 100vw; 
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            background: #444444; /* 【修正】視窗空隙背景改為深灰色 */
            cursor: grab;
            user-select: none;
        }
        .map-container:active {
            cursor: grabbing;
        }
        
        /* 地圖本體 */
        #mapWrapper {
            position: absolute;
            width: min(calc(100vw - 40px), calc(100vh - 120px));
            height: min(calc(100vw - 40px), calc(100vh - 120px));
            background-color: #dddddd; /* 【修正】未上傳圖片時，地圖畫布預設為淺灰色 */
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            background-position: center;
            border: 2px solid #222; 
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
            transform-origin: center center;
            will-change: transform;
        }
        
        .grid-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="box">
            <span>👤 角色：</span>
            <input type="text" id="charName" placeholder="名字" oninput="saveData()"> 
            <span>HP：</span><input type="number" id="charHP" value="10" oninput="saveData()"> 
            <span>SAN：</span><input type="number" id="charSAN" value="50" oninput="saveData()">
        </div>

        <div class="box" style="border-left: 1px solid #555; padding-left: 15px;">
            <label for="mapUpload" style="background:#e67e22; padding:6px 12px; border-radius:4px; cursor:pointer; font-weight:bold; font-size:14px;">🖼️ 上傳地圖</label>
            <input type="file" id="mapUpload" accept="image/*" style="display:none;" onchange="uploadMap(event)">
            <button onclick="clearMap()" style="background:#c0392b;">重設</button>
            <button onclick="resetZoom()" style="background:#7f8c8d;">居中復原</button>
        </div>

        <div class="box" style="border-left: 1px solid #555; padding-left: 15px;">
            <button onclick="rollDice(100)">D100</button>
            <button onclick="rollDice(20)" style="background:#27ae60;">D20</button>
            <button onclick="rollDice(6)" style="background:#8e44ad;">D6</button>
            <span class="dice-result" id="diceOutput">--</span>
        </div>
    </div>

    <!-- 地圖視窗 -->
    <div class="map-container" id="mapContainer">
        <div id="mapWrapper">
            <svg class="grid-layer" viewBox="0 0 500 500" xmlns="http://w3.org">
                <defs>
                    <pattern id="trpg-grid" width="10" height="10" patternUnits="userSpaceOnUse">
                        <!-- 【核心修正】將 stroke 屬性改為半透明黑色 rgba(0, 0, 0, 0.4) 確保上傳地圖後也能看清黑線 -->
                        <path d="M 10 0 L 0 0 L 0 10" fill="none" stroke="rgba(0, 0, 0, 0.4)" stroke-width="0.4"/>
                    </pattern>
                </defs>
                <rect width="500" height="500" fill="url(#trpg-grid)" />
            </svg>
        </div>
    </div>

    <script>
        let scale = 1;
        let posX = 0;
        let posY = 0;
        let isDragging = false;
        let startX, startY;

        const mapContainer = document.getElementById('mapContainer');
        const mapWrapper = document.getElementById('mapWrapper');

        window.onload = function() {
            if (localStorage.getItem("trpg_name")) document.getElementById("charName").value = localStorage.getItem("trpg_name");
            if (localStorage.getItem("trpg_hp")) document.getElementById("charHP").value = localStorage.getItem("trpg_hp");
            if (localStorage.getItem("trpg_san")) document.getElementById("charSAN").value = localStorage.getItem("trpg_san");
            
            const savedMap = localStorage.getItem("trpg_map_bg");
            if (savedMap) {
                mapWrapper.style.backgroundImage = `url('${savedMap}')`;
            }

            initMapControls();
        }

        function initMapControls() {
            function handleZoom(e) {
                e.preventDefault();
                const delta = e.deltaY ? -e.deltaY : e.wheelDelta;
                const zoomSpeed = 0.1;

                if (delta > 0) {
                    scale += zoomSpeed;
                } else {
                    scale -= zoomSpeed;
                }
                
                scale = Math.max(0.4, Math.min(6, scale));
                updateTransform();
            }

            mapContainer.addEventListener('wheel', handleZoom, { passive: false });
            mapContainer.addEventListener('mousewheel', handleZoom, { passive: false });

            mapContainer.addEventListener('mousedown', function(e) {
                isDragging = true;
                startX = e.clientX - posX;
                startY = e.clientY - posY;
            });

            window.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                posX = e.clientX - startX;
                posY = e.clientY - startY;
                updateTransform();
            });

            window.addEventListener('mouseup', function() {
                isDragging = false;
            });
        }

        function updateTransform() {
            mapWrapper.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        function resetZoom() {
            scale = 1;
            posX = 0;
            posY = 0;
            updateTransform();
        }

        function saveData() {
            localStorage.setItem("trpg_name", document.getElementById("charName").value);
            localStorage.setItem("trpg_hp", document.getElementById("charHP").value);
            localStorage.setItem("trpg_san", document.getElementById("charSAN").value);
        }

        function uploadMap(event) {
            const file = event.target.files[0]; 
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const imgData = e.target.result;
                mapWrapper.style.backgroundImage = `url('${imgData}')`;
                try {
                    localStorage.setItem("trpg_map_bg", imgData);
                } catch (error) {
                    console.log("圖片體積較大，僅供本次即時顯示。");
                }
            };
            reader.readAsDataURL(file);
        }

        function clearMap() {
            mapWrapper.style.backgroundImage = "none";
            localStorage.removeItem("trpg_map_bg");
            document.getElementById("mapUpload").value = "";
        }

        function rollDice(sides) {
            const result = Math.floor(Math.random() * sides) + 1;
            document.getElementById("diceOutput").innerText = `D${sides}➔${result}`;
        }
    </script>
</body>
</html>
