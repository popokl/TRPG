<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私人 TRPG 平台</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #121212;
            color: #ffffff;
            overflow: hidden;
        }

        /* 1. 地圖區域 (底層) */
        .map-area {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: auto;
            background-color: #1a1a1a;
            z-index: 1;
        }

        .grid-map {
            display: grid;
            grid-template-columns: repeat(50, 40px);
            grid-template-rows: repeat(50, 40px);
            background-color: #222;
            border: 1px solid #555;
            width: fit-content;
            margin: 100px auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .grid-cell {
            border: 1px solid #333;
            width: 40px; height: 40px;
            transition: background-color 0.2s;
        }

        .grid-cell:hover {
            background-color: #4a6fa5;
            cursor: pointer;
        }

        /* 浮動 UI 通用設定 */
        .floating-ui {
            position: fixed;
            z-index: 100;
            border: 1px solid #444;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.7);
        }

        /* 2. 玩家工具列 (上方) */
        .toolbar {
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(45, 45, 45, 0.95);
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .toolbar-title {
            font-weight: bold;
            margin-right: 5px;
            color: #ccc;
            font-size: 14px;
        }

        .toolbar button {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .toolbar button:hover { background: #555; }

        /* 側邊面板通用設定 */
        .side-panel {
            top: 50%;
            display: flex;
            align-items: stretch;
            background: rgba(30, 30, 30, 0.95);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 8px;
        }

        .panel-content {
            width: 250px;
            padding: 20px;
            min-height: 300px;
        }

        .panel-content h3 {
            margin-bottom: 15px;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
            font-size: 16px;
        }

        .toggle-btn {
            width: 40px;
            background: #4a6fa5;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 14px;
            writing-mode: vertical-lr;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toggle-btn:hover { background: #5c85c2; }

        /* 3. 角色資訊 (左方) */
        .left-panel {
            left: 0;
            transform: translate(calc(-100% + 40px), -50%);
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }
        .left-panel.open {
            transform: translate(0, -50%);
        }
        .left-panel .toggle-btn {
            border-top-right-radius: 8px;
            border-bottom-right-radius: 8px;
        }

        /* 4. 狀態資訊 (右方) */
        .right-panel {
            right: 0;
            transform: translate(calc(100% - 40px), -50%);
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
        }
        .right-panel.open {
            transform: translate(0, -50%);
        }
        .right-panel .toggle-btn {
            border-top-left-radius: 8px;
            border-bottom-left-radius: 8px;
        }

        /* 5. GM 工具 (下方) */
        .gm-panel {
            bottom: 0;
            left: 50%;
            transform: translate(-50%, calc(100% - 30px));
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: none;
            box-shadow: none;
            background: transparent;
        }

        .gm-panel:hover {
            transform: translate(-50%, 0);
        }

        .gm-trigger {
            background: #5a1a1a;
            border: 1px solid #883333;
            border-bottom: none;
            color: white;
            height: 30px;
            padding: 0 40px;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.5);
        }

        .gm-content {
            background: rgba(60, 25, 25, 0.95);
            border: 1px solid #883333;
            border-bottom: none;
            width: 600px;
            height: 180px;
            padding: 20px;
            border-radius: 8px 8px 0 0;
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.5);
        }

        .gm-content h3 {
            font-size: 16px;
            margin-bottom: 12px;
            border-bottom: 1px solid #773333;
            padding-bottom: 4px;
        }

        .gm-buttons {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
        }

        .gm-buttons button {
            background: #4a2323;
            color: white;
            border: 1px solid #884444;
            padding: 10px 0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .gm-buttons button:hover { background: #6b3333; }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- 底層：地圖區域 -->
    <main class="map-area">
        <div class="grid-map" id="map"></div>
    </main>

    <!-- 上方：玩家工具列 -->
    <div class="floating-ui toolbar">
        <span class="toolbar-title">玩家工具列</span>
        <button>擲骰</button>
        <button>移動角色</button>
        <button>測量路徑</button>
        <button>技能範圍</button>
        <button>畫筆</button>
    </div>

    <!-- 左方：角色資訊 -->
    <div class="floating-ui side-panel left-panel" id="leftPanel">
        <div class="panel-content">
            <h3>角色資訊</h3>
            <p>HP: 100 / 100</p>
            <p>MP: 50 / 50</p>
            <br>
            <p>力量: 15</p>
            <p>敏捷: 14</p>
            <p>智力: 10</p>
        </div>
        <button class="toggle-btn" onclick="togglePanel('leftPanel')">角色資訊</button>
    </div>

    <!-- 右方：狀態資訊 -->
    <div class="floating-ui side-panel right-panel" id="rightPanel">
        <button class="toggle-btn" onclick="togglePanel('rightPanel')">狀態資訊</button>
        <div class="panel-content">
            <h3>狀態與紀錄</h3>
            <p>[系統] 遊戲開始</p>
            <p>[玩家] 擲出了 18</p>
        </div>
    </div>

    <!-- 下方：GM 工具 -->
    <div class="floating-ui gm-panel" id="gmPanel">
        <div class="gm-trigger">GM 工具列</div>
        <div class="gm-content">
            <h3>GM 控制台</h3>
            <div class="gm-buttons">
                <button>地圖</button>
                <button>角色</button>
                <button>敵人</button>
                <button>道具</button>
                <button>狀態</button>
                <button>筆記</button>
            </div>
        </div>
    </div>

    <script>
        const mapContainer = document.getElementById('map');
        const MAP_SIZE = 50;
        const TOTAL_CELLS = MAP_SIZE * MAP_SIZE;

        for (let i = 0; i < TOTAL_CELLS; i++) {
            const cell = document.createElement('div');
            cell.classList.add('grid-cell');
            
            const x = i % MAP_SIZE;
            const y = Math.floor(i / MAP_SIZE);
            cell.dataset.x = x;
            cell.dataset.y = y;

            cell.addEventListener('click', () => {
                console.log(`點擊座標 X:${x}, Y:${y}`);
            });

            mapContainer.appendChild(cell);
        }

        function togglePanel(panelId) {
            const panel = document.getElementById(panelId);
            panel.classList.toggle('open');
        }

        const isGM = true; 
        if (!isGM) {
            document.getElementById('gmPanel').classList.add('hidden');
        }
    </script>
</body>
</html>
