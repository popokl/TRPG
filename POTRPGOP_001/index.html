<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私人 TRPG 平台</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #121212;
            color: #ffffff;
            overflow: hidden;
        }

        /* 1. 地圖區域 (底層) */
        .map-area {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: auto;
            background-color: #1a1a1a;
            z-index: 1;
        }

        .grid-map {
            display: grid;
            grid-template-columns: repeat(50, 40px);
            grid-template-rows: repeat(50, 40px);
            background-color: #222;
            border: 1px solid #555;
            width: fit-content;
            margin: 100px auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            transform-origin: center center;
            transition: transform 0.1s ease-out;
        }

        .grid-cell {
            border: 1px solid #333;
            width: 40px; height: 40px;
            transition: background-color 0.2s;
        }

        .grid-cell:hover {
            background-color: #4a6fa5;
            cursor: pointer;
        }

        /* 右下角地圖重設按鈕 */
        .reset-map-btn {
            position: fixed;
            bottom: 40px;
            right: 25px;
            width: 50px;
            height: 50px;
            background-color: #2d2d2d;
            color: white;
            border: 1px solid #555;
            border-radius: 50%;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: background-color 0.2s, transform 0.2s;
        }
        .reset-map-btn:hover {
            background-color: #444;
            transform: scale(1.05);
        }

        /* 浮動 UI 通用設定 */
        .floating-ui {
            position: fixed;
            z-index: 100;
            border: 1px solid #444;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.7);
        }

        /* 2. 玩家工具列 (上方) */
        .toolbar {
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(45, 45, 45, 0.95);
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .toolbar-title {
            font-weight: bold;
            margin-right: 5px;
            color: #ccc;
            font-size: 14px;
        }

        .toolbar button {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .toolbar button:hover { background: #555; }

        /* 側邊面板通用設定 */
        .side-panel {
            top: 50%;
            display: flex;
            align-items: stretch;
            background: rgba(30, 30, 30, 0.95);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 8px;
        }

        .panel-content {
            width: 280px;
            padding: 20px;
            min-height: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .panel-content h3 {
            margin-bottom: 15px;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
            font-size: 16px;
        }

        .toggle-btn {
            width: 40px;
            background: #4a6fa5;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 14px;
            writing-mode: vertical-lr;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toggle-btn:hover { background: #5c85c2; }

        /* 3. 角色資訊 (左方) */
        .left-panel {
            left: 0;
            transform: translate(calc(-100% + 40px), -50%);
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }
        .left-panel.open {
            transform: translate(0, -50%);
        }
        .left-panel .toggle-btn {
            border-top-right-radius: 8px;
            border-bottom-right-radius: 8px;
        }

        /* 角色卡片樣式 */
        .player-card {
            background: #222;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-name-input {
            background: transparent;
            border: none;
            color: white;
            font-weight: bold;
            width: 130px;
            font-size: 14px;
            border-bottom: 1px dashed #555;
            padding: 2px;
        }
        .player-name-input:focus {
            outline: none;
            border-bottom: 1px solid #4a6fa5;
        }

        .remove-player-btn {
            background: #5a1a1a;
            color: white;
            border: none;
            padding: 3px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .remove-player-btn:hover { background: #7a2222; }

        .player-stats {
            display: flex;
            gap: 10px;
            font-size: 13px;
        }

        .player-stats label {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-input {
            width: 60px;
            background: #1a1a1a;
            color: white;
            border: 1px solid #555;
            padding: 3px;
            border-radius: 3px;
            text-align: center;
        }
        .stat-input:focus {
            outline: none;
            border-color: #4a6fa5;
        }

        .action-btn {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            text-align: center;
        }
        .action-btn:hover { background: #444; }

        /* 4. 狀態資訊 (右方) */
        .right-panel {
            right: 0;
            transform: translate(calc(100% - 40px), -50%);
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
        }
        .right-panel.open {
            transform: translate(0, -50%);
        }
        .right-panel .toggle-btn {
            border-top-left-radius: 8px;
            border-bottom-left-radius: 8px;
        }

        /* 5. GM 工具 (下方) */
        .gm-panel {
            bottom: 0;
            left: 50%;
            transform: translate(-50%, calc(100% - 30px));
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: none;
            box-shadow: none;
            background: transparent;
        }

        .gm-panel:hover {
            transform: translate(-50%, 0);
        }

        .gm-trigger {
            background: #5a1a1a;
            border: 1px solid #883333;
            border-bottom: none;
            color: white;
            height: 30px;
            padding: 0 40px;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.5);
        }

        .gm-content {
            background: rgba(60, 25, 25, 0.95);
            border: 1px solid #883333;
            border-bottom: none;
            width: 600px;
            height: 180px;
            padding: 20px;
            border-radius: 8px 8px 0 0;
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.5);
        }

        .gm-content h3 {
            font-size: 16px;
            margin-bottom: 12px;
            border-bottom: 1px solid #773333;
            padding-bottom: 4px;
        }

        .gm-buttons {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
        }

        .gm-buttons button {
            background: #4a2323;
            color: white;
            border: 1px solid #884444;
            padding: 10px 0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .gm-buttons button:hover { background: #6b3333; }

        /* GM 小型互動視窗 (Modal) 樣式 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 300;
        }

        .modal-box {
            background: #2d2d2d;
            border: 1px solid #555;
            width: 400px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #444;
            padding-bottom: 8px;
        }

        .modal-header h3 {
            font-size: 16px;
        }

        .modal-close-btn {
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 18px;
            cursor: pointer;
        }
        .modal-close-btn:hover { color: white; }

        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .upload-btn {
            background: #4a2323;
            color: white;
            border: 1px solid #884444;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
        }
        .upload-btn:hover { background: #6b3333; }

        .preview-area {
            width: 100%;
            height: 200px;
            background: #1a1a1a;
            border: 1px dashed #555;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #777;
            font-size: 14px;
        }

        .preview-area img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- 底層：地圖區域 -->
    <main class="map-area" id="mapArea">
        <div class="grid-map" id="map"></div>
    </main>

    <!-- 右下角地圖重設按鈕 -->
    <button class="reset-map-btn" id="resetMapBtn" title="重設地圖">↺</button>

    <!-- 上方：玩家工具列 -->
    <div class="floating-ui toolbar">
        <span class="toolbar-title">玩家工具列</span>
        <button>擲骰</button>
        <button>移動角色</button>
        <button>測量路徑</button>
        <button>技能範圍</button>
        <button>畫筆</button>
    </div>

    <!-- 左方：角色資訊 -->
    <div class="floating-ui side-panel left-panel" id="leftPanel">
        <div class="panel-content">
            <h3>角色資訊</h3>
            <button class="action-btn" id="addPlayerBtn" style="margin-bottom: 12px;">增加玩家</button>
            <div id="playerList">
                <!-- 動態生成的玩家分格會在這裡顯示 -->
            </div>
        </div>
        <button class="toggle-btn" onclick="togglePanel('leftPanel')">角色資訊</button>
    </div>

    <!-- 右方：狀態資訊 -->
    <div class="floating-ui side-panel right-panel" id="rightPanel">
        <button class="toggle-btn" onclick="togglePanel('rightPanel')">狀態資訊</button>
        <div class="panel-content">
            <h3>狀態與紀錄</h3>
            <p>[系統] 遊戲開始</p>
            <p>[玩家] 擲過了 18</p>
        </div>
    </div>

    <!-- 下方：GM 工具 -->
    <div class="floating-ui gm-panel" id="gmPanel">
        <div class="gm-trigger">GM 工具列</div>
        <div class="gm-content">
            <h3>GM 控制台</h3>
            <div class="gm-buttons" id="gmButtonsContainer">
                <button data-tool="地圖">地圖</button>
                <button data-tool="角色">角色</button>
                <button data-tool="敵人">敵人</button>
                <button data-tool="道具">道具</button>
                <button data-tool="狀態">狀態</button>
                <button data-tool="筆記">筆記</button>
            </div>
        </div>
    </div>

    <!-- GM 點擊後的互動視窗 (Modal) -->
    <div class="modal-overlay" id="gmModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modalTitle">GM 工具視窗</h3>
                <button class="modal-close-btn" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <input type="file" id="fileInput" accept="image/*" class="hidden">
                <button class="upload-btn" id="uploadTriggerBtn">上傳圖片</button>
                <div class="preview-area" id="previewArea">
                    <span>圖片預覽區</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. 初始化 50x50 地圖
        const mapContainer = document.getElementById('map');
        const MAP_SIZE = 50;
        const TOTAL_CELLS = MAP_SIZE * MAP_SIZE;

        for (let i = 0; i < TOTAL_CELLS; i++) {
            const cell = document.createElement('div');
            cell.classList.add('grid-cell');
            
            const x = i % MAP_SIZE;
            const y = Math.floor(i / MAP_SIZE);
            cell.dataset.x = x;
            cell.dataset.y = y;

            cell.addEventListener('click', () => {
                console.log(`點擊座標 X:${x}, Y:${y}`);
            });

            mapContainer.appendChild(cell);
        }

        // 2. 側邊面板開關
        function togglePanel(panelId) {
            const panel = document.getElementById(panelId);
            panel.classList.toggle('open');
        }

        // 3. 角色資訊：增加與剃除玩家功能
        const addPlayerBtn = document.getElementById('addPlayerBtn');
        const playerList = document.getElementById('playerList');
        let playerCount = 0;

        addPlayerBtn.addEventListener('click', () => {
            playerCount++;
            const playerCard = document.createElement('div');
            playerCard.className = 'player-card';

            playerCard.innerHTML = `
                <div class="player-header">
                    <input type="text" class="player-name-input" value="玩家 ${playerCount}">
                    <button class="remove-player-btn">剃除</button>
                </div>
                <div class="player-stats">
                    <label>HP: <input type="number" class="stat-input" value="100"></label>
                    <label>MP: <input type="number" class="stat-input" value="50"></label>
                </div>
            `;

            // 綁定剃除按鈕事件
            const removeBtn = playerCard.querySelector('.remove-player-btn');
            removeBtn.addEventListener('click', () => {
                playerCard.remove();
            });

            playerList.appendChild(playerCard);
        });

        // 4. 地圖縮放與重設功能
        const mapArea = document.getElementById('mapArea');
        let currentScale = 1.0;
        const minScale = 0.4;
        const maxScale = 2.5;

        mapArea.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (e.deltaY < 0) {
                currentScale += 0.1;
                if (currentScale > maxScale) currentScale = maxScale;
            } else {
                currentScale -= 0.1;
                if (currentScale < minScale) currentScale = minScale;
            }
            mapContainer.style.transform = `scale(${currentScale})`;
        }, { passive: false });

        const resetMapBtn = document.getElementById('resetMapBtn');
        resetMapBtn.addEventListener('click', () => {
            currentScale = 1.0;
            mapContainer.style.transform = `scale(${currentScale})`;
        });

        // 5. GM 工具列按鍵彈出視窗與上傳預覽功能
        const gmModal = document.getElementById('gmModal');
        const modalTitle = document.getElementById('modalTitle');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const gmButtons = document.querySelectorAll('#gmButtonsContainer button');
        const fileInput = document.getElementById('fileInput');
        const uploadTriggerBtn = document.getElementById('uploadTriggerBtn');
        const previewArea = document.getElementById('previewArea');

        gmButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const toolName = btn.getAttribute('data-tool');
                modalTitle.textContent = `GM 工具 - ${toolName}管理`;
                previewArea.innerHTML = '<span>圖片預覽區</span>';
                fileInput.value = '';
                gmModal.style.display = 'flex';
            });
        });

        closeModalBtn.addEventListener('click', () => {
            gmModal.style.display = 'none';
        });

        gmModal.addEventListener('click', (e) => {
            if (e.target === gmModal) {
                gmModal.style.display = 'none';
            }
        });

        uploadTriggerBtn.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    previewArea.innerHTML = `<img src="${event.target.result}" alt="預覽圖片">`;
                };
                reader.readAsDataURL(file);
            }
        });

        // 6. 權限控制
        const isGM = true; 
        if (!isGM) {
            document.getElementById('gmPanel').classList.add('hidden');
        }
    </script>
</body>
</html>
