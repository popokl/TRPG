<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>🎲 TRPG 祕密跑團室 & 滿版戰術地圖</title>
    <style>
        /* 讓整個視窗填滿，不出現網頁最外層的捲軸 */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #1a1a1a; 
            font-family: sans-serif; 
            color: #fff;
            display: flex;
            flex-direction: column;
        }
        
        /* 上方控制列 */
        .control-panel { 
            display: flex; 
            gap: 15px; 
            padding: 10px 20px;
            background: #2a2a2a;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10;
            align-items: center;
        }
        .box { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        input, select { background: #333; color: #fff; border: 1px solid #555; padding: 5px; border-radius: 4px; }
        input[type="text"] { width: 90px; }
        input[type="number"] { width: 50px; }
        button { background: #4a90e2; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #357abd; }
        .dice-result { color: #ffcc00; font-weight: bold; margin-left: 5px; }
        
        /* 畫面中央的地圖區域：完全不填滿、不出現拉桿 */
        .map-container { 
            flex: 1; /* 自動填滿剩餘的所有垂直空間 */
            position: relative; 
            width: 100vw; 
            height: 100%;
            background: #111; 
            overflow: hidden; /* 確保絕對沒有拉桿 */
        }
        
        /* 地圖本體：畫布大小與容器完全一致 */
        #mapWrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: 100% 100%; /* 讓上傳的地圖圖片完美填滿、不變形溢出 */
            background-repeat: no-repeat;
            background-position: center;
        }
        
        /* SVG 網格圖層 */
        .grid-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .grid-line {
            stroke: rgba(255, 255, 255, 0.25); /* 半透明網格線，不遮擋地圖 */
            stroke-width: 1;
        }
    </style>
</head>
<body>

    <!-- 上方精簡控制列，不佔用垂直空間 -->
    <div class="control-panel">
        <div class="box">
            <span>👤 角色：</span>
            <input type="text" id="charName" placeholder="名字" oninput="saveData()"> 
            <span>HP：</span><input type="number" id="charHP" value="10" oninput="saveData()"> 
            <span>SAN：</span><input type="number" id="charSAN" value="50" oninput="saveData()">
        </div>

        <div class="box" style="border-left: 1px solid #555; padding-left: 15px;">
            <label for="mapUpload" style="background:#e67e22; padding:6px 12px; border-radius:4px; cursor:pointer; font-weight:bold; font-size:14px;">🖼️ 上傳地圖</label>
            <input type="file" id="mapUpload" accept="image/*" style="display:none;" onchange="uploadMap(event)">
            <button onclick="clearMap()" style="background:#c0392b;">重設</button>
        </div>

        <div class="box" style="border-left: 1px solid #555; padding-left: 15px;">
            <button onclick="rollDice(100)">D100</button>
            <button onclick="rollDice(20)" style="background:#27ae60;">D20</button>
            <button onclick="rollDice(6)" style="background:#8e44ad;">D6</button>
            <span class="dice-result" id="diceOutput">--</span>
        </div>
    </div>

    <!-- 畫面中央：完美滿版無拉桿地圖 -->
    <div class="map-container">
        <div id="mapWrapper">
            <!-- 透過 JavaScript 自動動態繪製的 50x50 網格 -->
            <svg class="grid-layer" id="svgGrid" xmlns="http://w3.org"></svg>
        </div>
    </div>

    <script>
        window.onload = function() {
            if (localStorage.getItem("trpg_name")) document.getElementById("charName").value = localStorage.getItem("trpg_name");
            if (localStorage.getItem("trpg_hp")) document.getElementById("charHP").value = localStorage.getItem("trpg_hp");
            if (localStorage.getItem("trpg_san")) document.getElementById("charSAN").value = localStorage.getItem("trpg_san");
            
            const savedMap = localStorage.getItem("trpg_map_bg");
            if (savedMap) {
                document.getElementById("mapWrapper").style.backgroundImage = `url('${savedMap}')`;
            }

            // 建立 50x50 網格
            draw50x50Grid();
            // 螢幕大小改變時，重新計算並繪製網格以維持無拉桿
            window.addEventListener('resize', draw50x50Grid);
        }

        // 動態精準繪製 50x50 網格線的函式
        function draw50x50Grid() {
            const svg = document.getElementById("svgGrid");
            svg.innerHTML = ""; // 清空舊格線
            
            const width = svg.clientWidth;
            const height = svg.clientHeight;
            
            // 繪製 49 條垂直線，將寬度平分成 50 等分
            for (let i = 1; i < 50; i++) {
                const x = (width / 50) * i;
                const line = document.createElementNS("http://w3.org", "line");
                line.setAttribute("x1", x); y1 = 0;
                line.setAttribute("y1", 0);
                line.setAttribute("x2", x);
                line.setAttribute("y2", height);
                line.setAttribute("class", "grid-line");
                svg.appendChild(line);
            }
            
            // 繪製 49 條水平線，將高度平分成 50 等分
            for (let i = 1; i < 50; i++) {
                const y = (height / 50) * i;
                const line = document.createElementNS("http://w3.org", "line");
                line.setAttribute("x1", 0);
                line.setAttribute("y1", y);
                line.setAttribute("x2", width);
                line.setAttribute("y2", y);
                line.setAttribute("class", "grid-line");
                svg.appendChild(line);
            }
        }

        function saveData() {
            localStorage.setItem("trpg_name", document.getElementById("charName").value);
            localStorage.setItem("trpg_hp", document.getElementById("charHP").value);
            localStorage.setItem("trpg_san", document.getElementById("charSAN").value);
        }

        function uploadMap(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const imgData = e.target.result;
                document.getElementById("mapWrapper").style.backgroundImage = `url('${imgData}')`;
                try {
                    localStorage.setItem("trpg_map_bg", imgData);
                } catch (error) {
                    alert("圖片較大，已成功顯示！但下次重開可能需要重新上傳。建議圖檔壓在 1MB 以內。");
                }
            };
            reader.readAsDataURL(file);
        }

        function clearMap() {
            document.getElementById("mapWrapper").style.backgroundImage = "none";
            localStorage.removeItem("trpg_map_bg");
            document.getElementById("mapUpload").value = "";
        }

        function rollDice(sides) {
            const result = Math.floor(Math.random() * sides) + 1;
            document.getElementById("diceOutput").innerText = `D${sides}➔${result}`;
        }
    </script>
</body>
</html>
