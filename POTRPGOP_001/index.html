<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私人 TRPG 平台</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #121212;
            color: #ffffff;
            overflow: hidden;
            user-select: none;
        }

        /* 1. 地圖區域 (底層) - 取消右方與下方拉桿 */
        .map-area {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            z-index: 1;
            cursor: default;
        }

        .grid-map {
            position: relative;
            display: grid;
            grid-template-columns: repeat(50, 40px);
            grid-template-rows: repeat(50, 40px);
            background-color: #222;
            background-size: cover;
            background-position: center;
            border: 1px solid #555;
            width: fit-content;
            margin: 100px auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            transform-origin: center center;
            transition: transform 0.05s ease-out;
        }

        .grid-cell {
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 40px; height: 40px;
            transition: background-color 0.2s;
        }

        .grid-cell:hover {
            background-color: rgba(74, 111, 165, 0.4);
            cursor: pointer;
        }

        /* 棋子樣式 */
        .map-token {
            position: absolute;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.7);
            overflow: hidden;
            cursor: grab;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #333;
        }
        .map-token:active {
            cursor: grabbing;
        }
        .map-token.selected {
            border-color: #ffcc00;
            box-shadow: 0 0 10px #ffcc00;
        }
        .map-token img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        /* 右下角地圖重設按鈕 */
        .reset-map-btn {
            position: fixed;
            bottom: 40px;
            right: 25px;
            width: 50px;
            height: 50px;
            background-color: #2d2d2d;
            color: white;
            border: 1px solid #555;
            border-radius: 50%;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: background-color 0.2s, transform 0.2s;
        }
        .reset-map-btn:hover {
            background-color: #444;
            transform: scale(1.05);
        }

        /* 浮動 UI 通用設定 */
        .floating-ui {
            position: fixed;
            z-index: 100;
            border: 1px solid #444;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.7);
        }

        /* 2. 玩家工具列 (上方) */
        .toolbar {
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(45, 45, 45, 0.95);
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .toolbar-title {
            font-weight: bold;
            margin-right: 5px;
            color: #ccc;
            font-size: 14px;
        }

        .toolbar button {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .toolbar button:hover { background: #555; }

        /* 側邊面板通用設定 */
        .side-panel {
            top: 50%;
            display: flex;
            align-items: stretch;
            background: rgba(30, 30, 30, 0.95);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 8px;
        }

        .panel-content {
            width: 320px;
            padding: 20px;
            min-height: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .panel-content h3 {
            margin-bottom: 15px;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
            font-size: 16px;
        }

        .toggle-btn {
            width: 40px;
            background: #4a6fa5;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 14px;
            writing-mode: vertical-lr;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toggle-btn:hover { background: #5c85c2; }

        /* 3. 角色資訊 (左方) */
        .left-panel {
            left: 0;
            transform: translate(calc(-100% + 40px), -50%);
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }
        .left-panel.open {
            transform: translate(0, -50%);
        }
        .left-panel .toggle-btn {
            border-top-right-radius: 8px;
            border-bottom-right-radius: 8px;
        }

        /* 角色卡片樣式 */
        .player-card {
            background: #222;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
            cursor: context-menu;
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-name-input {
            background: transparent;
            border: none;
            color: white;
            font-weight: bold;
            width: 100%;
            font-size: 14px;
            border-bottom: 1px dashed #555;
            padding: 2px;
        }
        .player-name-input:focus {
            outline: none;
            border-bottom: 1px solid #4a6fa5;
        }

        /* 數值分隔群組 */
        .player-stats {
            display: flex;
            gap: 6px;
            font-size: 13px;
        }

        .stat-box {
            padding: 4px 6px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            flex: 1;
        }

        .hp-box {
            background-color: #ffcccc;
            color: #333;
        }

        .mp-box {
            background-color: #cce5ff;
            color: #333;
        }

        .shield-box {
            background-color: #d4edda;
            color: #333;
        }

        .stat-box label {
            display: flex;
            align-items: center;
            gap: 2px;
            font-weight: bold;
            font-size: 12px;
            width: 100%;
        }

        .stat-input {
            width: 100%;
            background: #ffffff;
            color: #333;
            border: 1px solid #ccc;
            padding: 2px;
            border-radius: 3px;
            text-align: center;
            font-weight: bold;
        }
        .stat-input:focus {
            outline: none;
            border-color: #4a6fa5;
        }

        .action-btn {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            text-align: center;
        }
        .action-btn:hover { background: #444; }

        /* 右鍵彈出選單 */
        .context-menu {
            position: fixed;
            background: #2d2d2d;
            border: 1px solid #555;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: none;
            z-index: 400;
            padding: 4px 0;
            min-width: 100px;
        }

        .context-menu-item {
            padding: 8px 15px;
            cursor: pointer;
            font-size: 14px;
            color: #fff;
        }

        .context-menu-item:hover {
            background: #5a1a1a;
        }

        /* 4. 狀態資訊 (右方) */
        .right-panel {
            right: 0;
            transform: translate(calc(100% - 40px), -50%);
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
        }
        .right-panel.open {
            transform: translate(0, -50%);
        }
        .right-panel .toggle-btn {
            border-top-left-radius: 8px;
            border-bottom-left-radius: 8px;
        }

        /* 5. GM 工具 (下方) */
        .gm-panel {
            bottom: 0;
            left: 50%;
            transform: translate(-50%, calc(100% - 30px));
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: none;
            box-shadow: none;
            background: transparent;
        }

        .gm-panel:hover {
            transform: translate(-50%, 0);
        }

        .gm-trigger {
            background: #5a1a1a;
            border: 1px solid #883333;
            border-bottom: none;
            color: white;
            height: 30px;
            padding: 0 40px;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.5);
        }

        .gm-content {
            background: rgba(60, 25, 25, 0.95);
            border: 1px solid #883333;
            border-bottom: none;
            width: 600px;
            height: 180px;
            padding: 20px;
            border-radius: 8px 8px 0 0;
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.5);
        }

        .gm-content h3 {
            font-size: 16px;
            margin-bottom: 12px;
            border-bottom: 1px solid #773333;
            padding-bottom: 4px;
        }

        .gm-buttons {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            position: relative;
        }

        .gm-buttons button {
            background: #4a2323;
            color: white;
            border: 1px solid #884444;
            padding: 10px 0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .gm-buttons button:hover { background: #6b3333; }

        /* GM 懸浮預覽視窗 (Hover Popup) */
        .gm-hover-popup {
            position: absolute;
            bottom: 75px;
            background: #2d2d2d;
            border: 1px solid #884444;
            border-radius: 6px;
            padding: 10px;
            display: none;
            flex-wrap: wrap;
            gap: 8px;
            z-index: 350;
            max-width: 300px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }
        .gm-hover-popup img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .gm-hover-popup img:hover {
            transform: scale(1.1);
            border-color: #ffcc00;
        }
        .gm-hover-popup .empty-hint {
            font-size: 12px;
            color: #888;
            padding: 5px;
        }

        /* GM 互動視窗 (Modal) 樣式 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 400;
        }

        .modal-box {
            background: #2d2d2d;
            border: 1px solid #555;
            width: 400px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #444;
            padding-bottom: 8px;
        }

        .modal-header h3 {
            font-size: 16px;
        }

        .modal-close-btn {
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 18px;
            cursor: pointer;
        }
        .modal-close-btn:hover { color: white; }

        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .upload-btn, .modal-action-btn {
            background: #4a2323;
            color: white;
            border: 1px solid #884444;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
        }
        .upload-btn:hover, .modal-action-btn:hover { background: #6b3333; }

        .preview-area {
            width: 100%;
            height: 200px;
            background: #1a1a1a;
            border: 1px dashed #555;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #777;
            font-size: 14px;
        }

        .preview-area img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 圓形裁切預覽專用 */
        .circular-preview-container {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #884444;
            margin: 0 auto;
            background: #1a1a1a;
        }
        .circular-preview-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- 底層：地圖區域 -->
    <main class="map-area" id="mapArea">
        <div class="grid-map" id="map"></div>
    </main>

    <!-- 右下角地圖重設按鈕 -->
    <button class="reset-map-btn" id="resetMapBtn" title="重設地圖">↺</button>

    <!-- 上方：玩家工具列 -->
    <div class="floating-ui toolbar">
        <span class="toolbar-title">玩家工具列</span>
        <button>擲骰</button>
        <button>移動角色</button>
        <button>測量路徑</button>
        <button>技能範圍</button>
        <button>畫筆</button>
    </div>

    <!-- 左方：角色資訊 -->
    <div class="floating-ui side-panel left-panel" id="leftPanel">
        <div class="panel-content">
            <h3>角色資訊</h3>
            <button class="action-btn" id="addPlayerBtn" style="margin-bottom: 12px;">增加玩家</button>
            <div id="playerList"></div>
        </div>
        <button class="toggle-btn" onclick="togglePanel('leftPanel')">角色資訊</button>
    </div>

    <!-- 玩家卡片右鍵選單 -->
    <div class="context-menu" id="playerContextMenu">
        <div class="context-menu-item" id="contextRemovePlayer">剔除</div>
    </div>

    <!-- 右方：狀態資訊 -->
    <div class="floating-ui side-panel right-panel" id="rightPanel">
        <button class="toggle-btn" onclick="togglePanel('rightPanel')">狀態資訊</button>
        <div class="panel-content">
            <h3>狀態與紀錄</h3>
            <p>[系統] 遊戲開始</p>
            <p>[玩家] 擲過了 18</p>
        </div>
    </div>

    <!-- 下方：GM 工具 -->
    <div class="floating-ui gm-panel" id="gmPanel">
        <div class="gm-trigger">GM 工具列</div>
        <div class="gm-content">
            <h3>GM 控制台</h3>
            <div class="gm-buttons" id="gmButtonsContainer">
                <button data-tool="地圖">地圖</button>
                <button data-tool="角色">角色</button>
                <button data-tool="敵人">敵人</button>
                <button data-tool="道具">道具</button>
                <button data-tool="狀態">狀態</button>
                <button data-tool="筆記">筆記</button>
                <!-- 懸浮預覽視窗 -->
                <div class="gm-hover-popup" id="gmHoverPopup"></div>
            </div>
        </div>
    </div>

    <!-- GM 上傳視窗 (Modal) -->
    <div class="modal-overlay" id="gmModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modalTitle">GM 工具視窗</h3>
                <button class="modal-close-btn" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <input type="file" id="fileInput" accept="image/*" class="hidden">
                <button class="upload-btn" id="uploadTriggerBtn">上傳圖片</button>
                <div class="preview-area" id="previewArea">
                    <span>圖片預覽區</span>
                </div>
                <button class="modal-action-btn" id="uploadConfirmBtn">確認</button>
            </div>
        </div>
    </div>

    <!-- 地圖切換確認視窗 -->
    <div class="modal-overlay" id="mapConfirmModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3>地圖切換確認</h3>
                <button class="modal-close-btn" id="closeMapConfirmBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="preview-area" id="mapPreviewArea"></div>
                <button class="modal-action-btn" id="mapConfirmSwitchBtn">確認切換</button>
            </div>
        </div>
    </div>

    <!-- 角色/敵人棋子建立視窗 -->
    <div class="modal-overlay" id="tokenModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="tokenModalTitle">建立棋子</h3>
                <button class="modal-close-btn" id="closeTokenModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="circular-preview-container">
                    <img id="tokenPreviewImg" src="" alt="預覽">
                </div>
                <button class="modal-action-btn" id="tokenConfirmBtn">確認</button>
            </div>
        </div>
    </div>

    <script>
        // 資料儲存：分類圖片庫
        const gmImages = {
            地圖: [],
            角色: [],
            敵人: [],
            道具: [],
            狀態: [],
            筆記: []
        };

        // 1. 初始化 50x50 地圖
        const mapContainer = document.getElementById('map');
        const MAP_SIZE = 50;
        const TOTAL_CELLS = MAP_SIZE * MAP_SIZE;

        for (let i = 0; i < TOTAL_CELLS; i++) {
            const cell = document.createElement('div');
            cell.classList.add('grid-cell');
            
            const x = i % MAP_SIZE;
            const y = Math.floor(i / MAP_SIZE);
            cell.dataset.x = x;
            cell.dataset.y = y;

            cell.addEventListener('click', () => {
                console.log(`點擊座標 X:${x}, Y:${y}`);
            });

            mapContainer.appendChild(cell);
        }

        // 2. 側邊面板開關
        function togglePanel(panelId) {
            const panel = document.getElementById(panelId);
            panel.classList.toggle('open');
        }

        // 3. 角色資訊：增加玩家與右鍵彈窗剔除功能
        const addPlayerBtn = document.getElementById('addPlayerBtn');
        const playerList = document.getElementById('playerList');
        const playerContextMenu = document.getElementById('playerContextMenu');
        let activePlayerCard = null;

        addPlayerBtn.addEventListener('click', () => {
            const currentCount = playerList.children.length + 1;
            const playerCard = document.createElement('div');
            playerCard.className = 'player-card';

            playerCard.innerHTML = `
                <div class="player-header">
                    <input type="text" class="player-name-input" value="玩家 ${currentCount}">
                </div>
                <div class="player-stats">
                    <div class="stat-box hp-box">
                        <label>HP: <input type="number" class="stat-input" value="0"></label>
                    </div>
                    <div class="stat-box mp-box">
                        <label>MP: <input type="number" class="stat-input" value="0"></label>
                    </div>
                    <div class="stat-box shield-box">
                        <label>護盾: <input type="number" class="stat-input" value="0"></label>
                    </div>
                </div>
            `;

            // 綁定右鍵事件
            playerCard.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                activePlayerCard = playerCard;
                playerContextMenu.style.display = 'block';
                playerContextMenu.style.left = `${e.clientX}px`;
                playerContextMenu.style.top = `${e.clientY}px`;
            });

            playerList.appendChild(playerCard);
        });

        // 右鍵選單點擊剔除
        document.getElementById('contextRemovePlayer').addEventListener('click', () => {
            if (activePlayerCard) {
                activePlayerCard.remove();
                activePlayerCard = null;
            }
            playerContextMenu.style.display = 'none';
        });

        // 點擊其他地方關閉右鍵選單
        window.addEventListener('click', () => {
            playerContextMenu.style.display = 'none';
        });

        // 4. 地圖拖曳平移、縮放與重設功能 (大幅增加縮小範圍)
        const mapArea = document.getElementById('mapArea');
        let currentScale = 1.0;
        let panX = 0;
        let panY = 0;
        let isDragging = false;
        let startX, startY;
        const minScale = 0.05;
        const maxScale = 3.0;

        function updateMapTransform() {
            mapContainer.style.transform = `translate(${panX}px, ${panY}px) scale(${currentScale})`;
        }

        mapArea.addEventListener('mousedown', (e) => {
            if (e.button === 0 && e.target === mapArea) { // 左鍵拖曳背景
                isDragging = true;
                startX = e.clientX - panX;
                startY = e.clientY - panY;
                mapArea.style.cursor = 'grabbing';
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            panX = e.clientX - startX;
            panY = e.clientY - startY;
            updateMapTransform();
        });

        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                mapArea.style.cursor = 'default';
            }
        });

        mapArea.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (e.deltaY < 0) {
                currentScale += 0.1;
                if (currentScale > maxScale) currentScale = maxScale;
            } else {
                currentScale -= 0.1;
                if (currentScale < minScale) currentScale = minScale;
            }
            updateMapTransform();
        }, { passive: false });

        const resetMapBtn = document.getElementById('resetMapBtn');
        resetMapBtn.addEventListener('click', () => {
            currentScale = 1.0;
            panX = 0;
            panY = 0;
            updateMapTransform();
        });

        // 5. GM 工具列按鍵彈出視窗與上傳預覽、分類懸浮預覽、切換地圖與建立棋子功能
        const gmModal = document.getElementById('gmModal');
        const modalTitle = document.getElementById('modalTitle');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const gmButtons = document.querySelectorAll('#gmButtonsContainer button');
        const fileInput = document.getElementById('fileInput');
        const uploadTriggerBtn = document.getElementById('uploadTriggerBtn');
        const uploadConfirmBtn = document.getElementById('uploadConfirmBtn');
        const previewArea = document.getElementById('previewArea');
        const gmHoverPopup = document.getElementById('gmHoverPopup');

        let currentToolCategory = '';
        let currentTempImageSrc = '';

        // 點擊 GM 按鈕開啓上傳 Modal
        gmButtons.forEach(btn => {
            const toolName = btn.getAttribute('data-tool');

            btn.addEventListener('click', () => {
                currentToolCategory = toolName;
                modalTitle.textContent = `GM 工具 - ${toolName}管理`;
                previewArea.innerHTML = '<span>圖片預覽區</span>';
                fileInput.value = '';
                currentTempImageSrc = '';
                gmModal.style.display = 'flex';
                gmHoverPopup.style.display = 'none';
            });

            // 滑鼠移入按鍵跳出懸浮視窗預覽該分類圖片
            btn.addEventListener('mouseenter', () => {
                currentToolCategory = toolName;
                renderHoverPopup(toolName);
                gmHoverPopup.style.display = 'flex';
            });

            btn.addEventListener('mouseleave', (e) => {
                // 如果移動到 hover popup 本身則不關閉
                if (!gmHoverPopup.contains(e.relatedTarget)) {
                    gmHoverPopup.style.display = 'none';
                }
            });
        });

        gmHoverPopup.addEventListener('mouseleave', () => {
            gmHoverPopup.style.display = 'none';
        });

        function renderHoverPopup(category) {
            gmHoverPopup.innerHTML = '';
            const images = gmImages[category];
            if (!images || images.length === 0) {
                gmHoverPopup.innerHTML = `<div class="empty-hint">尚無上傳圖片</div>`;
                return;
            }
            images.forEach((imgSrc) => {
                const img = document.createElement('img');
                img.src = imgSrc;
                img.addEventListener('click', () => {
                    gmHoverPopup.style.display = 'none';
                    handleImageSelection(category, imgSrc);
                });
                gmHoverPopup.appendChild(img);
            });
        }

        closeModalBtn.addEventListener('click', () => {
            gmModal.style.display = 'none';
        });

        gmModal.addEventListener('click', (e) => {
            if (e.target === gmModal) {
                gmModal.style.display = 'none';
            }
        });

        uploadTriggerBtn.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    currentTempImageSrc = event.target.result;
                    previewArea.innerHTML = `<img src="${currentTempImageSrc}" alt="預覽圖片">`;
                };
                reader.readAsDataURL(file);
            }
        });

        // 點擊「確認」按鈕將圖片儲存至該分類
        uploadConfirmBtn.addEventListener('click', () => {
            if (currentTempImageSrc && currentToolCategory) {
                gmImages[currentToolCategory].push(currentTempImageSrc);
                alert(`成功儲存圖片至「${currentToolCategory}」分類！`);
                gmModal.style.display = 'none';
            } else {
                alert('請先選擇要上傳的圖片！');
            }
        });

        // 6. 懸浮視窗點擊圖片後的邏輯
        const mapConfirmModal = document.getElementById('mapConfirmModal');
        const mapPreviewArea = document.getElementById('mapPreviewArea');
        const closeMapConfirmBtn = document.getElementById('closeMapConfirmBtn');
        const mapConfirmSwitchBtn = document.getElementById('mapConfirmSwitchBtn');
        
        const tokenModal = document.getElementById('tokenModal');
        const tokenPreviewImg = document.getElementById('tokenPreviewImg');
        const closeTokenModalBtn = document.getElementById('closeTokenModalBtn');
        const tokenConfirmBtn = document.getElementById('tokenConfirmBtn');
        const tokenModalTitle = document.getElementById('tokenModalTitle');

        let selectedImageForAction = '';
        let selectedCategoryForAction = '';

        function handleImageSelection(category, imgSrc) {
            selectedImageForAction = imgSrc;
            selectedCategoryForAction = category;

            if (category === '地圖') {
                mapPreviewArea.innerHTML = `<img src="${imgSrc}" alt="地圖預覽">`;
                mapConfirmModal.style.display = 'flex';
            } else if (category === '角色' || category === '敵人') {
                tokenModalTitle.textContent = `建立${category}棋子`;
                tokenPreviewImg.src = imgSrc;
                tokenModal.style.display = 'flex';
            } else {
                alert(`點擊了 ${category} 圖片`);
            }
        }

        // 地圖切換確認
        closeMapConfirmBtn.addEventListener('click', () => {
            mapConfirmModal.style.display = 'none';
        });
        mapConfirmModal.addEventListener('click', (e) => {
            if (e.target === mapConfirmModal) mapConfirmModal.style.display = 'none';
        });

        mapConfirmSwitchBtn.addEventListener('click', () => {
            mapContainer.style.backgroundImage = `url('${selectedImageForAction}')`;
            mapConfirmModal.style.display = 'none';
            alert('已成功切換網格地圖背景！');
        });

        // 角色/敵人棋子建立確認
        closeTokenModalBtn.addEventListener('click', () => {
            tokenModal.style.display = 'none';
        });
        tokenModal.addEventListener('click', (e) => {
            if (e.target === tokenModal) tokenModal.style.display = 'none';
        });

        tokenConfirmBtn.addEventListener('click', () => {
            createToken(selectedImageForAction);
            tokenModal.style.display = 'none';
        });

        // 7. 棋子生成與互動/縮放功能
        let activeToken = null;

        function createToken(imgSrc) {
            const token = document.createElement('div');
            token.className = 'map-token';
            // 預設大小為 1 個網格大小 (40px)
            token.dataset.gridSize = 1; 
            token.style.width = '40px';
            token.style.height = '40px';

            // 初始置中於地圖可視區中心附近
            token.style.left = `${(50 * 40 / 2) - 20}px`;
            token.style.top = `${(50 * 40 / 2) - 20}px`;

            const img = document.createElement('img');
            img.src = imgSrc;
            token.appendChild(img);

            // 點擊選取棋子
            token.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                if (activeToken && activeToken !== token) {
                    activeToken.classList.remove('selected');
                }
                activeToken = token;
                token.classList.add('selected');

                // 拖曳棋子邏輯
                let shiftX = e.clientX - token.getBoundingClientRect().left;
                let shiftY = e.clientY - token.getBoundingClientRect().top;
                const mapRect = mapContainer.getBoundingClientRect();

                function moveAt(clientX, clientY) {
                    let x = (clientX - mapRect.left - shiftX) / currentScale;
                    let y = (clientY - mapRect.top - shiftY) / currentScale;
                    token.style.left = `${x}px`;
                    token.style.top = `${y}px`;
                }

                function onMouseMove(event) {
                    moveAt(event.clientX, event.clientY);
                }

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', () => {
                    document.removeEventListener('mousemove', onMouseMove);
                }, { once: true });
            });

            // 滾輪縮放：等比例每次一網格大小 (40px) 方式縮放
            token.addEventListener('wheel', (e) => {
                e.preventDefault();
                e.stopPropagation();
                let gridSize = parseInt(token.dataset.gridSize);
                if (e.deltaY < 0) {
                    gridSize += 1; // 放大一網格
                    if (gridSize > 10) gridSize = 10; // 上限防爆
                } else {
                    gridSize -= 1; // 縮小一網格
                    if (gridSize < 1) gridSize = 1; // 最小 1 網格
                }
                token.dataset.gridSize = gridSize;
                const newSize = gridSize * 40;
                token.style.width = `${newSize}px`;
                token.style.height = `${newSize}px`;
            }, { passive: false });

            mapContainer.appendChild(token);
        }

        // 點擊地圖空白處取消棋子選取
        mapArea.addEventListener('click', (e) => {
            if (e.target === mapArea || e.target.classList.contains('grid-cell') || e.target.id === 'map') {
                if (activeToken) {
                    activeToken.classList.remove('selected');
                    activeToken = null;
                }
            }
        });

        // 8. 權限控制
        const isGM = true; 
        if (!isGM) {
            document.getElementById('gmPanel').classList.add('hidden');
        }
    </script>
</body>
</html>
