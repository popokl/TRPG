<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私人 TRPG 平台 - 浮動版面</title>
    <style>
        /* 重置預設與全局樣式 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #121212;
            color: #ffffff;
            overflow: hidden; /* 防止整個網頁出現預期的滾動條 */
        }

        /* ========== 1. 地圖區域 (底層) ========== */
        .map-area {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: auto; /* 當地圖大於螢幕時允許滾動 */
            background-color: #1a1a1a;
            z-index: 1; /* 設定在最底層 */
        }

        /* 50x50 地圖網格本身 */
        .grid-map {
            display: grid;
            grid-template-columns: repeat(50, 40px);
            grid-template-rows: repeat(50, 40px);
            background-color: #222;
            border: 1px solid #555;
            width: fit-content;
            margin: 100px auto; /* 讓地圖置中並與邊緣保持距離 */
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .grid-cell {
            border: 1px solid #333;
            width: 40px; height: 40px;
            transition: background-color 0.2s;
        }

        .grid-cell:hover {
            background-color: #4a6fa5;
            cursor: pointer;
        }

        /* ========== 浮動 UI 通用設定 ========== */
        .floating-ui {
            position: fixed;
            z-index: 100; /* 確保浮浮在圖層之上 */
            border: 1px solid #444;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.7);
        }

        /* ========== 2. 玩家工具列 (上方置中縮小) ========== */
        .toolbar {
            top: 15px;
            left: 50%;
            transform: translateX(-50%); /* 完美置中 */
            background: rgba(45, 45, 45, 0.9);
            padding: 10px 25px;
            border-radius: 30px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .toolbar button {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
        }
        .toolbar button:hover { background: #555; }

        /* ========== 側邊面板通用設定 ========== */
        .side-panel {
            top: 50%;
            display: flex;
            align-items: stretch;
            background: rgba(30, 30, 30, 0.95);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); /* 平滑滑動動畫 */
            border-radius: 10px;
        }

        .panel-content {
            width: 250px;
            padding: 20px;
            min-height: 300px;
        }

        .panel-content h3 {
            margin-bottom: 15px;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
        }

        /* 側邊開關按鈕 */
        .toggle-btn {
            width: 40px;
            background: #4a6fa5;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toggle-btn:hover { background: #5c85c2; }

        /* ========== 3. 角色資訊 (左方) ========== */
        .left-panel {
            left: 0;
            /* 預設隱藏內容，只露出 40px 的按鈕。Y軸置中 (-50%) */
            transform: translate(calc(-100% + 40px), -50%);
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }
        .left-panel.open {
            transform: translate(0, -50%); /* 點擊後滑出 */
        }
        .left-panel .toggle-btn {
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        /* ========== 4. 狀態資訊 (右方) ========== */
        .right-panel {
            right: 0;
            /* 預設隱藏內容，只露出 40px 的按鈕 */
            transform: translate(calc(100% - 40px), -50%);
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
        }
        .right-panel.open {
            transform: translate(0, -50%); /* 點擊後滑出 */
        }
        .right-panel .toggle-btn {
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
        }

        /* ========== 5. GM 工具 (下方浮動/滑鼠移入展開) ========== */
        .gm-panel {
            bottom: 0;
            left: 50%;
            /* 預設隱藏，只露出 30px 高的 Trigger 箭頭 */
            transform: translate(-50%, calc(100% - 30px)); 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: none;
            box-shadow: none;
            background: transparent;
        }

        /* 滑鼠移上去時，往上滑出完整視窗 */
        .gm-panel:hover {
            transform: translate(-50%, 0);
        }

        .gm-trigger {
            background: #8b0000;
            border: 1px solid #ff4444;
            border-bottom: none;
            color: white;
            height: 30px;
            padding: 0 40px;
            border-radius: 10px 10px 0 0;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.5);
        }

        .gm-content {
            background: rgba(74, 35, 35, 0.95);
            border: 1px solid #ff4444;
            border-bottom: none;
            width: 600px;
            height: 200px;
            padding: 20px;
            border-radius: 10px 10px 0 0;
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.5);
        }

        /* 權限控制隱藏 */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- 1. 底層：地圖區域 -->
    <main class="map-area">
        <div class="grid-map" id="map">
            <!-- 網格由 JavaScript 動態生成 -->
        </div>
    </main>

    <!-- 2. 上方：玩家工具列 -->
    <div class="floating-ui toolbar">
        <span>⚔️ 玩家工具列</span>
        <button>🎲 擲骰</button>
        <button>📏 測量距離</button>
    </div>

    <!-- 3. 左方：角色資訊 (按鈕點擊展開) -->
    <div class="floating-ui side-panel left-panel" id="leftPanel">
        <div class="panel-content">
            <h3>👤 角色資訊</h3>
            <p>HP: 100 / 100</p>
            <p>MP: 50 / 50</p>
            <br>
            <p>力量: 15</p>
            <p>敏捷: 14</p>
            <p>智力: 10</p>
        </div>
        <button class="toggle-btn" onclick="togglePanel('leftPanel')">👤</button>
    </div>

    <!-- 4. 右方：狀態資訊 (按鈕點擊展開) -->
    <div class="floating-ui side-panel right-panel" id="rightPanel">
        <button class="toggle-btn" onclick="togglePanel('rightPanel')">📜</button>
        <div class="panel-content">
            <h3>📜 狀態與紀錄</h3>
            <p>[系統] 遊戲開始</p>
            <p>[玩家1] 擲出了 18</p>
            <p>[GM] 哥布林出現了！</p>
        </div>
    </div>

    <!-- 5. 下方：GM 工具 (滑鼠移入自動展開) -->
    <div class="floating-ui gm-panel" id="gmPanel">
        <div class="gm-trigger">⏶ GM 專屬工具 ⏶</div>
        <div class="gm-content">
            <h3>👑 GM 控制台</h3>
            <p>這裡只有 GM 看得到，而且滑鼠移開就會自動縮下去。</p>
            <br>
            <button style="padding:5px;">+ 生成怪物</button>
            <button style="padding:5px;">切換地圖</button>
        </div>
    </div>

    <script>
        // --- 初始化 50x50 地圖 ---
        const mapContainer = document.getElementById('map');
        const MAP_SIZE = 50;
        const TOTAL_CELLS = MAP_SIZE * MAP_SIZE;

        for (let i = 0; i < TOTAL_CELLS; i++) {
            const cell = document.createElement('div');
            cell.classList.add('grid-cell');
            
            const x = i % MAP_SIZE;
            const y = Math.floor(i / MAP_SIZE);
            cell.dataset.x = x;
            cell.dataset.y = y;

            // 測試：點擊印出座標
            cell.addEventListener('click', () => {
                console.log(`你點擊了座標 X:${x}, Y:${y}`);
            });

            mapContainer.appendChild(cell);
        }

        // --- 側邊面板展開/收合控制 ---
        function togglePanel(panelId) {
            const panel = document.getElementById(panelId);
            // 透過切換 'open' class 來觸發 CSS 的 transform 滑動
            panel.classList.toggle('open');
        }

        // --- 權限控制 (GM 判定) ---
        // 這裡設定為 true，你可以改為 false 看看玩家視角（下方 GM 工具會消失）
        const isGM = true; 

        if (!isGM) {
            document.getElementById('gmPanel').classList.add('hidden');
        }
    </script>
</body>
</html>
