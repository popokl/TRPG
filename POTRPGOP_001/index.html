<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>TRPG</title>
    <!-- 載入雲端樣式庫與核心控制邏輯 -->
    <link rel="stylesheet" href="https://jsdelivr.net">
</head>
<body>
    <!-- 右下角獨立重設按鈕 -->
    <button class="reset-zoom-btn" id="btnResetZoom" title="居中復原">⟳</button>

    <!-- 上方：擲骰檢定工具列 -->
    <div class="bar">
        <span style="font-weight:bold;">擲骰檢定：</span>
        <button onclick="rollDice(100)">D100</button>
        <button onclick="rollDice(20)" style="background:#27ae60;">D20</button>
        <button onclick="rollDice(10)" style="background:#d35400;">D10</button>
        <button onclick="rollDice(6)" style="background:#8e44ad;">D6</button>
        <button onclick="rollDice(4)" style="background:#2980b9;">D4</button>
        <span id="diceOutput" style="color:#ffcc00;font-weight:bold;margin-left:10px;">等待擲骰...</span>
    </div>
    
    <!-- 中間主體：左側欄與 50x50 戰術地圖 -->
    <div class="main-content">
        <div class="left-sidebar">
            <h3 style="margin:0 0 5px 0;border-bottom:1px solid #444;padding-bottom:5px;color:#4a90e2;font-size:16px;">角色資訊</h3>
            <div class="sidebar-item"><label>角色姓名：</label><input type="text" id="charName" oninput="saveData()"></div>
            <div class="sidebar-item"><label>目前血量 (HP)：</label><input type="number" id="charHP" value="10" oninput="saveData()"></div>
            <div class="sidebar-item"><label>理智值 (SAN)：</label><input type="number" id="charSAN" value="50" oninput="saveData()"></div>
        </div>
        <div class="map-container" id="mapContainer">
            <div id="mapWrapper">
                <svg class="grid-layer" viewBox="0 0 500 500" xmlns="http://w3.org">
                    <defs><pattern id="trpg-grid" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M 10 0 L 0 0 L 0 10" fill="none" stroke="rgba(0,0,0,0.65)" stroke-width="1.2"/></pattern></defs>
                    <rect width="500" height="500" fill="url(#trpg-grid)" stroke="rgba(0,0,0,0.65)" stroke-width="1.2" />
                </svg>
            </div>
        </div>
    </div>

    <!-- 下方快捷列：黑框白字按鈕 -->
    <div class="bottom-float">
        <div class="arrow-trigger">▲</div>
        <div class="bar bottom-bar">
            <button class="btn-black-white" onclick="openModal('modalMap')">地圖</button>
            <button class="btn-black-white" onclick="openModal('modalToken')">棋子</button>
            <button class="btn-black-white" onclick="openModal('modalStatus')">狀態</button>
        </div>
    </div>

    <!-- 地圖視窗 -->
    <div class="modal" id="modalMap">
        <div class="modal-header"><span>地圖管理庫</span><button class="modal-close" onclick="closeModal('modalMap')">X</button></div>
        <div class="modal-body">
            <label class="upload-btn" for="mapUpload" style="background:#e67e22; text-align:center;">上傳新地圖圖片</label>
            <input type="file" id="mapUpload" accept="image/*" style="display:none;" onchange="uploadMap(event)">
            <div class="preview-box" id="mapPreviewArea"></div>
        </div>
    </div>

    <!-- 棋子視窗 -->
    <div class="modal" id="modalToken">
        <div class="modal-header"><span>棋子資源庫</span><button class="modal-close" onclick="closeModal('modalToken')">X</button></div>
        <div class="modal-body">
            <label class="upload-btn" for="tokenUpload" style="background:#2ecc71; text-align:center;">上傳新棋子圖片</label>
            <input type="file" id="tokenUpload" accept="image/*" style="display:none;" onchange="uploadToken(event)">
            <div class="preview-box" id="tokenPreviewArea"></div>
        </div>
    </div>

    <!-- 狀態視窗 -->
    <div class="modal" id="modalStatus">
        <div class="modal-header"><span>狀態標記庫</span><button class="modal-close" onclick="closeModal('modalStatus')">X</button></div>
        <div class="modal-body">
            <label class="upload-btn" for="statusUpload" style="background:#3498db; text-align:center;">上傳新狀態圖片</label>
            <input type="file" id="statusUpload" accept="image/*" style="display:none;" onchange="uploadStatus(event)">
            <div class="preview-box" id="statusPreviewArea"></div>
        </div>
    </div>

    <!-- 自訂右鍵選單 -->
    <div id="ctxMenu"><div class="ctx-item" id="ctxDelBtn" style="color:#ff6b6b;">刪除</div></div>

    <!-- 引入高安全性、不佔複製體積的跑團核心 JavaScript 驅動引擎 -->
    <script src="https://jsdelivr.net"></script>
</body>
</html>
